/* Normalização de status de embarque */
const NORM_STATUS = {
  "DELIVERED":"ENTREGUE","ENTREGUE":"ENTREGUE",
  "IN TRANSIT":"EMBARCADO","EM TRÂNSITO":"EMBARCADO",
  "AT PORT":"NO PORTO","DISCHARGED":"NO PORTO",

  "NO PORTO":"NO PORTO","EMBARCADO":"EMBARCADO","CARTEIRA":"CARTEIRA"
};

function normalize(rec) {
  const r = {...rec};
  if(r.cliente) r.cliente = NORM_CLIENTE[r.cliente] || r.cliente;
  if(r.destino) r.destino = NORM_DESTINO[r.destino] || r.destino;
  if(r.porto_origem) r.porto_origem = NORM_PORTO[r.porto_origem] || r.porto_origem;
  if(r.porto_carga) r.porto_carga = NORM_PORTO[r.porto_carga] || r.porto_carga;
  if(r.status) r.status = NORM_STATUS[r.status] !== undefined ? NORM_STATUS[r.status] : r.status;
  return r;
}

/* Aplicar normalização nos registros históricos em memória */
HIST_RECS.forEach((r,i) => { HIST_RECS[i] = normalize(r); });

const fmtUSD = v => (!v && v!==0) ? "—" : new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(v);
const fmtDate = d => { if(!d) return "—"; const dt=new Date(d+"T00:00:00"); return isNaN(dt)?"—":dt.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"}); };
const fmtInt = v => { if(v===null||v===undefined||v==="") return "—"; const s=String(v); return s.endsWith(".0")?s.slice(0,-2):s; };

/* ── Excel helpers ── */
function xlDate(d) {
  if(!d) return "";
  const dt = new Date(d+"T00:00:00");
  return isNaN(dt) ? "" : dt.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"});
}
function xlUSD(v) { return v ? Number(v) : ""; }
function xlInt(v) { if(v===null||v===undefined||v==="") return ""; const s=String(v); return s.endsWith(".0")?s.slice(0,-2):s; }

/* Styles constants for xlsx-js-style (we use XLSX which supports !cols/!rows but not cell styles in community build)
   We use a workaround: build rich HTML then convert, OR build formatted aoa with merged cells via XLSX.utils */

/* ══════════════════════════════════════════════════
   OPERACIONAL Excel Export — fiel ao modelo original
══════════════════════════════════════════════════ */
/* ══════════════════════════════════════════════════
   ESTILOS SALVARO para Excel (xlsx-js-style)
   Paleta: azul #1A6DC8, escuro #1A2B3C, cinza #F4F7FA
══════════════════════════════════════════════════ */
const XS = {
  title:   {font:{name:"Calibri",sz:14,bold:true,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"1A6DC8"}},alignment:{horizontal:"left",vertical:"center"},border:{bottom:{style:"medium",color:{rgb:"1A6DC8"}}}},
  subtitle:{font:{name:"Calibri",sz:10,bold:true,color:{rgb:"1A6DC8"}},alignment:{horizontal:"left",vertical:"center"}},
  mesLabel:{font:{name:"Calibri",sz:11,bold:true,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"1A2B3C"}},alignment:{horizontal:"left",vertical:"center"},border:{bottom:{style:"thin",color:{rgb:"1A2B3C"}}}},
  header:  {font:{name:"Calibri",sz:9,bold:true,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"1A6DC8"}},alignment:{horizontal:"center",vertical:"center",wrapText:true},border:{bottom:{style:"thin",color:{rgb:"135BA8"}},right:{style:"hair",color:{rgb:"4A90D9"}}}},
  row0:    {font:{name:"Calibri",sz:9,color:{rgb:"1A2B3C"}},alignment:{horizontal:"center",vertical:"center"},border:{bottom:{style:"hair",color:{rgb:"D9E2EC"}}}},
  row1:    {font:{name:"Calibri",sz:9,color:{rgb:"1A2B3C"}},fill:{fgColor:{rgb:"F4F7FA"}},alignment:{horizontal:"center",vertical:"center"},border:{bottom:{style:"hair",color:{rgb:"D9E2EC"}}}},
  total:   {font:{name:"Calibri",sz:10,bold:true,color:{rgb:"1A6DC8"}},fill:{fgColor:{rgb:"E8F1FB"}},alignment:{horizontal:"right",vertical:"center"},border:{top:{style:"thin",color:{rgb:"1A6DC8"}},bottom:{style:"double",color:{rgb:"1A6DC8"}}}},
  totalLbl:{font:{name:"Calibri",sz:10,bold:true,color:{rgb:"1A2B3C"}},fill:{fgColor:{rgb:"E8F1FB"}},alignment:{horizontal:"right",vertical:"center"},border:{top:{style:"thin",color:{rgb:"1A6DC8"}},bottom:{style:"double",color:{rgb:"1A6DC8"}}}},
  date:    {font:{name:"Calibri",sz:8,color:{rgb:"6B7280"}},alignment:{horizontal:"right"}},
};

function applyStyle(ws, ref, style) {
  if(!ws[ref]) ws[ref] = {t:"s",v:""};
  ws[ref].s = style;
}

function applyRowStyles(ws, rowIdx, colCount, style) {
  for(let c=0;c<colCount;c++){
    const ref = XLSX.utils.encode_cell({r:rowIdx,c});
    applyStyle(ws, ref, style);
  }
}

function exportOperacionalXLS(ant, antRows, vig, vigRows, seg, segRows) {
  const today = new Date().toLocaleDateString("pt-BR");
  const aoa = [];
  const COLS = 14;

  /* Row 0: title bar */
  aoa.push(["CONTROLE OPERACIONAL DE EMBARQUES","","","","","","","","","","","","ATUALIZADO EM",today]);

  const sectionStarts = [];
  const merges = [{s:{r:0,c:0},e:{r:0,c:11}}];

  function pushSection(mesLabel, rows) {
    aoa.push([]); /* spacer */
    const startRow = aoa.length;
    sectionStarts.push({start:startRow, dataStart:startRow+2, dataEnd:startRow+2+rows.length-1, totalRow:startRow+2+rows.length});
    aoa.push([mesLabel,"","","","","","","","","","","","",""]);
    merges.push({s:{r:startRow,c:0},e:{r:startRow,c:COLS-1}});
    aoa.push(["Nº","INV","CLIENTE","PO#","NF","DESTINO","ETA","AGENTE","BOOKING","CONTAINER","NAVIO","DL CARGA","ESTUFAGEM","TRANSP."]);
    rows.forEach((r,i) => {
      aoa.push([
        r.nr||i+1, r.invoice||"", r.cliente||"", xlInt(r.po), xlInt(r.nf), r.destino||"",
        xlDate(r.eta_pedido), r.agente||"", xlInt(r.booking), r.container||"", r.navio||"",
        xlDate(r.dl_carga), xlDate(r.estufagem), r.transportadora||""
      ]);
    });
    const totalUSD = rows.reduce((s,r)=>s+(r.valor_usd||0),0);
    aoa.push(["","","","TOTAL USD:","","$"+totalUSD.toFixed(2),"","","Nº CONTAINERS:",rows.length,"","","",""]);
  }

  pushSection(ant, antRows);
  pushSection(vig, vigRows);
  pushSection(seg, segRows);

  const ws = XLSX.utils.aoa_to_sheet(aoa);

  /* Title row */
  for(let c=0;c<COLS;c++) applyStyle(ws, XLSX.utils.encode_cell({r:0,c}), XS.title);
  applyStyle(ws, XLSX.utils.encode_cell({r:0,c:12}), {font:{name:"Calibri",sz:8,color:{rgb:"6B7280"}},fill:{fgColor:{rgb:"1A6DC8"}},alignment:{horizontal:"right"},border:XS.title.border});
  applyStyle(ws, XLSX.utils.encode_cell({r:0,c:13}), {font:{name:"Calibri",sz:8,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"1A6DC8"}},alignment:{horizontal:"right"},border:XS.title.border});

  /* Each section */
  sectionStarts.forEach(sec => {
    for(let c=0;c<COLS;c++) applyStyle(ws, XLSX.utils.encode_cell({r:sec.start,c}), {...XS.mesLabel, alignment:{horizontal:"center",vertical:"center"}});
    applyRowStyles(ws, sec.start+1, COLS, XS.header);
    for(let r=sec.dataStart;r<=sec.dataEnd;r++){
      applyRowStyles(ws, r, COLS, (r-sec.dataStart)%2===0?XS.row1:XS.row0);
    }
    for(let c=0;c<COLS;c++){
      const ref = XLSX.utils.encode_cell({r:sec.totalRow,c});
      applyStyle(ws, ref, (c===5)?XS.total:XS.totalLbl);
    }
  });

  ws["!merges"] = merges;
  ws["!cols"] = [
    {wch:4.9},{wch:7.9},{wch:14.9},{wch:12.9},{wch:7.9},{wch:13.9},
    {wch:10.9},{wch:20.9},{wch:13.9},{wch:15.9},{wch:18.9},{wch:11.9},{wch:11},{wch:10.9}
  ];
  ws["!rows"] = [{hpx:28}];
  ws["!pageSetup"] = {orientation:"landscape",paperSize:9,fitToWidth:1,fitToHeight:0,fitToPage:true};
  ws["!printOptions"] = {gridLines:false};
  ws["!margins"] = {left:0.4,right:0.4,top:0.6,bottom:0.5,header:0.3,footer:0.3};

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "OPERACIONAL");
  XLSX.writeFile(wb, `Operacional_${vig.replace(" ","_")}.xlsx`);
}

  aoa.push([]); /* spacer */

  /* Row 2: month labels (merged B3:G3 and J3:O3) */
  aoa.push(["",m1,"","","","","","","",m2,"","","","",""]);

  /* Row 3: headers */
  const HDR = ["INV","CLIENTE","PO#","USD","DESTINO","ETA"];
  aoa.push(["", ...HDR, "","", ...HDR]);

  const maxRows12 = Math.max(rows1.length, rows2.length);

    ]);
  }

  const t1=rows1.reduce((s,r)=>s+(r.valor_usd||0),0);
  const t2=rows2.reduce((s,r)=>s+(r.valor_usd||0),0);
  const totRow12 = aoa.length;
  aoa.push(["","","TOTAL:","","$"+t1.toFixed(2),"","","","","","TOTAL:","","$"+t2.toFixed(2),"",""]);
  const cntRow12 = aoa.length;
  aoa.push(["","","Nº containers:",rows1.length,"","","","","","","Nº containers:",rows2.length,"","",""]);
  aoa.push([]);

  const m3Start = aoa.length;
  aoa.push(["",m3,"","","","",""]); /* merge B:G */

  for(let c=0;c<TCOLS;c++) applyStyle(ws, XLSX.utils.encode_cell({r:0,c}), XS.title);
  applyStyle(ws, XLSX.utils.encode_cell({r:0,c:13}), {font:{name:"Calibri",sz:9,bold:true,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"1A6DC8"}},alignment:{horizontal:"left"},border:XS.title.border});

  for(let c=0;c<TCOLS;c++){
    const isGap = c===7||c===8;
    applyStyle(ws, XLSX.utils.encode_cell({r:3,c}), isGap?XS.row0:XS.header);
  }

  /* Data zebra m1+m2 */
  for(let r=4;r<4+maxRows12;r++){
    for(let c=0;c<TCOLS;c++){
      const isGap = c===7||c===8;
      const isZebra = (r-4)%2===0;
      applyStyle(ws, XLSX.utils.encode_cell({r,c}), isGap?{}:(isZebra?XS.row1:XS.row0));
    }
  }

  /* Totals m1+m2 */
  for(let c=0;c<TCOLS;c++){
    const isGap = c===7||c===8;
    applyStyle(ws, XLSX.utils.encode_cell({r:totRow12,c}), isGap?{}:XS.total);
    applyStyle(ws, XLSX.utils.encode_cell({r:cntRow12,c}), isGap?{}:XS.totalLbl);
  }

  /* m3 section */
  for(let c=0;c<7;c++) applyStyle(ws, XLSX.utils.encode_cell({r:m3Start,c}), {...XS.mesLabel, alignment:{horizontal:"left",vertical:"center"}});
  for(let c=0;c<7;c++) applyStyle(ws, XLSX.utils.encode_cell({r:m3Start+1,c}), XS.header);
  for(let r=m3Start+2;r<m3Start+2+rows3.length;r++){
    const isZebra = (r-m3Start-2)%2===0;
    for(let c=0;c<7;c++) applyStyle(ws, XLSX.utils.encode_cell({r,c}), isZebra?XS.row0:XS.row1);
  }
  for(let c=0;c<7;c++){
    applyStyle(ws, XLSX.utils.encode_cell({r:totRow3,c}), XS.total);
    applyStyle(ws, XLSX.utils.encode_cell({r:cntRow3,c}), XS.totalLbl);
  }

  /* Merges matching reference */
  ws["!merges"] = [
    {s:{r:0,c:1},e:{r:0,c:12}},     /* B1:M1 title */
    {s:{r:2,c:1},e:{r:2,c:6}},       /* B3:G3 m1 label */
    {s:{r:2,c:9},e:{r:2,c:14}},      /* J3:O3 m2 label */
    {s:{r:m3Start,c:1},e:{r:m3Start,c:6}}, /* B:G m3 label */
  ];

  /* Col widths matching reference exactly */
  ws["!cols"] = [
    {wch:2.9},{wch:8.9},{wch:14.9},{wch:12.9},{wch:13.9},{wch:14.9},{wch:12.9},
    {wch:1.9},{wch:1},
    {wch:8.9},{wch:14.9},{wch:12.9},{wch:13.9},{wch:14.9},{wch:12.9}
  ];

  ws["!rows"] = [{hpx:28}];

  ws["!pageSetup"] = {orientation:"landscape",paperSize:9,fitToWidth:1,fitToHeight:0,fitToPage:true};
  ws["!printOptions"] = {gridLines:false};
  ws["!margins"] = {left:0.4,right:0.4,top:0.6,bottom:0.5,header:0.3,footer:0.3};

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "CARTEIRA");
  XLSX.writeFile(wb, `Carteira_${m1.replace(" ","_")}.xlsx`);
}

/* Field component — definido FORA dos componentes que o usam para preservar
   identidade entre renders (senão o React desmonta o input a cada tecla
   digitada e o foco se perde) */
const Field = ({label,field,type="text",opts=null,form,upd}) => (
  <div className="field">
    <label>{label}</label>
    {opts
      ? <select value={form[field]||""} onChange={e=>upd(field,e.target.value)}>
          <option value="">— selecione —</option>
          {opts.map(o=><option key={o}>{o}</option>)}
        </select>
      : <input type={type} value={form[field]||""} onChange={e=>upd(field,e.target.value)}/>}
  </div>
);

const Bar = ({data,color="#1A6DC8",fmt,total}) => {
  const max=Math.max(...data.map(d=>d.v),1);
  return <div>{data.map((d,i)=>(
    <div key={i} className="br2">
      <div className="bl2" title={d.l}>{d.l}</div>
      <div className="bt"><div className="bf" style={{width:`${(d.v/max)*100}%`,background:color}}/></div>
      <div className="bv">{fmt?fmt(d.v):d.v}{total?<span style={{color:"#94A3B8",fontSize:10,marginLeft:3}}>({(d.v/total*100).toFixed(1)}%)</span>:null}</div>
    </div>
  ))}</div>;
};

const Donut = ({data}) => {
  const total=data.reduce((s,d)=>s+d.v,0);
  if(!total) return null;
  const r=38,cx=55,cy=55,circ=2*Math.PI*r;
  const COLS=["#1A6DC8","#D97706","#059669","#EA580C","#7C3AED","#DC2626","#DB2777","#0891B2"];
  let off=0;
  const segs=data.map((d,i)=>{const pct=d.v/total,dash=pct*circ,seg={...d,dash,off:off*circ,c:COLS[i%COLS.length]};off+=pct;return seg;});
  return <div style={{display:"flex",alignItems:"center",gap:16}}>
    <svg width="110" height="110" viewBox="0 0 110 110" style={{flexShrink:0}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#EEF2F6" strokeWidth="14"/>
      {segs.map((s,i)=><circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.c} strokeWidth="14"
        strokeDasharray={`${s.dash} ${circ-s.dash}`} strokeDashoffset={circ/4-s.off}/>)}
      <text x={cx} y={cy+5} textAnchor="middle" fill="#1A2B3C" fontSize="14" fontWeight="700" fontFamily="Syne">{total}</text>
    </svg>
    <div style={{display:"flex",flexDirection:"column",gap:7}}>
      {segs.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:12}}>
        <div style={{width:9,height:9,borderRadius:"50%",background:s.c,flexShrink:0}}/>
        <span style={{color:"#5A7288"}}>{s.l}</span>
        <span style={{marginLeft:"auto",fontWeight:600,paddingLeft:10,color:"#1A2B3C"}}>{s.v}</span>
      </div>)}
    </div>
  </div>;
};

/* Gráfico de linha temporal para séries longas (modo "TODOS") */
const LineChart = ({data, fmt, height=220}) => {
  const [hover,setHover]=useState(null);
  if(!data||!data.length) return null;

  const W=680, H=height, padL=60, padR=20, padT=20, padB=40;
  const chartW=W-padL-padR, chartH=H-padT-padB;
  const max=Math.max(...data.map(d=>d.v),1);
  const n=data.length;

  /* Posições X e Y */
  const px = (i) => padL + (i/(n-1||1))*chartW;
  const py = (v) => padT + chartH - (v/max)*chartH;

  /* Polyline path */
  const pts = data.map((d,i)=>`${px(i)},${py(d.v)}`).join(" ");

  /* Area fill path */
  const area = `M${px(0)},${py(0)} ${data.map((d,i)=>`L${px(i)},${py(d.v)}`).join(" ")} L${px(n-1)},${padT+chartH} L${px(0)},${padT+chartH} Z`;

  /* Grid lines Y (5 linhas) */
  const gridY = Array.from({length:5},(_, i)=>{
    const val = max * (i+1)/5;
    const y = py(val);
    return {y, label: "$"+Math.round(val/1000)+"k"};
  });

  /* Labels X — mostrar apenas marcadores de ano (JAN de cada ano) */
  const yearMarks = [];
  let lastAno="";
  data.forEach((d,i)=>{
    if(d.ano && d.ano !== lastAno){
      yearMarks.push({x:px(i), label:d.ano});
      lastAno=d.ano;
    }
  });

  return <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}
    onMouseLeave={()=>setHover(null)}>
    {/* Grid horizontal */}
    {gridY.map((g,i)=><g key={i}>
      <line x1={padL} y1={g.y} x2={W-padR} y2={g.y} stroke="var(--border)" strokeWidth="0.5" strokeDasharray="4 3"/>
      <text x={padL-8} y={g.y+4} textAnchor="end" fill="var(--text3)" fontSize="10" fontFamily="DM Sans,sans-serif">{g.label}</text>
    </g>)}

    {/* Eixo base */}
    <line x1={padL} y1={padT+chartH} x2={W-padR} y2={padT+chartH} stroke="var(--border)" strokeWidth="0.5"/>

    {/* Labels de ano no eixo X */}
    {yearMarks.map((m,i)=><g key={i}>
      <line x1={m.x} y1={padT+chartH} x2={m.x} y2={padT+chartH+6} stroke="var(--text3)" strokeWidth="0.5"/>
      <text x={m.x} y={padT+chartH+20} textAnchor="middle" fill="var(--text2)" fontSize="10" fontWeight="500" fontFamily="DM Sans,sans-serif">{m.label}</text>
    </g>)}

    {/* Area preenchida */}
    <path d={area} fill="var(--blue)" opacity="0.08"/>

    {/* Linha principal */}
    <polyline points={pts} fill="none" stroke="var(--blue)" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>

    {/* Hit areas invisíveis + pontos + tooltip */}
    {data.map((d,i)=>{
      const cx=px(i), cy_=py(d.v);
      const isHover = hover===i;
      return <g key={i}>
        <rect x={cx-Math.max(chartW/n/2,4)} y={padT} width={Math.max(chartW/n,8)} height={chartH}
          fill="transparent" onMouseEnter={()=>setHover(i)} style={{cursor:"crosshair"}}/>
        {isHover&&<>
          <line x1={cx} y1={padT} x2={cx} y2={padT+chartH} stroke="var(--blue)" strokeWidth="0.5" strokeDasharray="3 3" opacity="0.5"/>
          <circle cx={cx} cy={cy_} r={4} fill="var(--blue)" stroke="#fff" strokeWidth="2"/>
          <g>
            <rect x={cx-48} y={cy_-36} width={96} height={28} rx={6} fill="var(--text)" opacity="0.9"/>
            <text x={cx} y={cy_-22} textAnchor="middle" fill="#fff" fontSize="10" fontFamily="DM Sans,sans-serif" fontWeight="500">{d.full||d.l}</text>
            <text x={cx} y={cy_-12} textAnchor="middle" fill="#fff" fontSize="10" fontFamily="DM Sans,sans-serif" opacity="0.8">{fmt?fmt(d.v):d.v}</text>
          </g>
        </>}
      </g>;
    })}
  </svg>;
};
