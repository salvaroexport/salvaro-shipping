/* ══════════════════════════════════════════
   LOGIN — Tela de autenticação
══════════════════════════════════════════ */
function Login({onLogin, notify}) {
  const [email,setEmail]=useState("");
  const [pwd,setPwd]=useState("");
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");

  async function handleLogin(e) {
    e.preventDefault();
    setErr("");
    if(!email || !pwd) { setErr("Preencha email e senha"); return; }
    setBusy(true);
    const {data, error} = await db.auth.signInWithPassword({email, password: pwd});
    setBusy(false);
    if(error) {
      setErr(error.message === "Invalid login credentials" 
        ? "Email ou senha incorretos" 
        : error.message);
      return;
    }
    onLogin(data.session);
  }

  return <>
    <style>{CSS}</style>
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#F0F2F5",padding:20}}>
      <div style={{background:"#fff",borderRadius:14,padding:"36px 32px",width:"100%",maxWidth:380,boxShadow:"0 4px 24px rgba(0,0,0,0.08)",border:"1px solid #D8E2EB"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <h1 style={{fontFamily:"Syne,sans-serif",fontSize:30,fontWeight:800,color:"#1A6DC8",letterSpacing:-1,margin:0}}>
            SALV<span style={{color:"#D97706"}}>ARO</span>
          </h1>
          <p style={{fontSize:12,color:"#5A7288",marginTop:6,letterSpacing:1.5,textTransform:"uppercase"}}>Export Control</p>
        </div>
        <form onSubmit={handleLogin}>
          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:11,fontWeight:600,color:"#5A7288",letterSpacing:.5,textTransform:"uppercase",marginBottom:6}}>Email</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} autoComplete="username"
              style={{width:"100%",padding:"10px 12px",fontSize:14,border:"1px solid #D8E2EB",borderRadius:8,fontFamily:"DM Sans,sans-serif",outline:"none",color:"#1A2B3C"}}
              onFocus={e=>e.target.style.borderColor="#1A6DC8"} onBlur={e=>e.target.style.borderColor="#D8E2EB"} />
          </div>
          <div style={{marginBottom:18}}>
            <label style={{display:"block",fontSize:11,fontWeight:600,color:"#5A7288",letterSpacing:.5,textTransform:"uppercase",marginBottom:6}}>Senha</label>
            <input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} autoComplete="current-password"
              style={{width:"100%",padding:"10px 12px",fontSize:14,border:"1px solid #D8E2EB",borderRadius:8,fontFamily:"DM Sans,sans-serif",outline:"none",color:"#1A2B3C"}}
              onFocus={e=>e.target.style.borderColor="#1A6DC8"} onBlur={e=>e.target.style.borderColor="#D8E2EB"} />
          </div>
          {err && <div style={{background:"#FEF2F2",border:"1px solid #FECACA",color:"#991B1B",padding:"9px 12px",borderRadius:8,fontSize:12,marginBottom:14}}>{err}</div>}
          <button type="submit" disabled={busy}
            style={{width:"100%",padding:"11px",fontSize:14,fontWeight:600,background:busy?"#94A8BA":"#1A6DC8",color:"#fff",border:"none",borderRadius:8,cursor:busy?"wait":"pointer",fontFamily:"DM Sans,sans-serif",transition:"background .15s"}}>
            {busy ? "Entrando..." : "Entrar"}
          </button>
        </form>
        <div style={{marginTop:20,paddingTop:16,borderTop:"1px solid #EEF2F6",fontSize:11,color:"#94A8BA",textAlign:"center",lineHeight:1.5}}>
          Acesso restrito à equipe Salvaro.<br/>Em caso de problemas com login, contate o administrador do sistema.
        </div>
      </div>
    </div>
  </>;
}

function App() {
  const [session,setSession]=useState(null);
  const [authChecking,setAuthChecking]=useState(true);
  const [recs,setRecs]=useState([]);
  const [loading,setLoading]=useState(false);
  const [toast,setToast]=useState(null);
  const notify=useCallback((msg,type="ok")=>setToast({msg,type}),[]);

  /* ── Hook de persistência: sincroniza estado com localStorage ── */
  function usePersist(key, defaultVal) {
    const [val, setVal] = useState(() => {
      try { const s = localStorage.getItem("sv_"+key); return s !== null ? JSON.parse(s) : defaultVal; }
      catch { return defaultVal; }
    });
    const set = useCallback(v => {
      setVal(v);
      try { localStorage.setItem("sv_"+key, JSON.stringify(v)); } catch {}
    },[key]);
    return [val, set];
  }

  /* ── Estados persistentes de todos os filtros ── */
  const _now=new Date(),_ci=_now.getMonth(),_cy=String(_now.getFullYear());
  const _pi=_ci===0?11:_ci-1, _py=_ci===0?String(_now.getFullYear()-1):_cy;
  const _ni=(_ci+1)%12, _ny=_ci===11?String(_now.getFullYear()+1):_cy;
  const _n2=(_ci+2)%12, _n2y=_ci>=10?String(_now.getFullYear()+1):_cy;

  /* Aba ativa */
  const [pg,setPg]=usePersist("pg","dash");
  /* Operacional - 3 meses */
  const [opsAnt,setOpsAnt]=usePersist("opsAnt",MESES[_pi]+" "+_py);
  const [opsVig,setOpsVig]=usePersist("opsVig",MESES[_ci]+" "+_cy);
  const [opsSeg,setOpsSeg]=usePersist("opsSeg",MESES[_ni]+" "+_ny);
  /* Carteira - 3 meses */
  /* Carteira: sempre mês vigente + 2 próximos (automático) */
  const cartM1 = MESES[_ci]+" "+_cy;
  const cartM2 = MESES[_ni]+" "+_ny;
  const cartM3 = MESES[_n2]+" "+_n2y;
  /* Dashboard - ano */
  const [dashYr,setDashYr]=usePersist("dashYr","2026");
  /* Base de Dados - filtros */
  const [baseQ,setBaseQ]=usePersist("baseQ","");
  const [baseFC,setBaseFC]=usePersist("baseFC","");
  const [baseFM,setBaseFM]=usePersist("baseFM","");
  const [baseFD,setBaseFD]=usePersist("baseFD","");
  /* Relatórios - tab, ano, mês */
  const [relTab,setRelTab]=usePersist("relTab","mensal");
  const [relYr,setRelYr]=usePersist("relYr","2026");
  const [relMes,setRelMes]=usePersist("relMes","ABRIL 2026");

  /* Restaurar sessão salva ao iniciar e escutar mudanças de auth */
  useEffect(()=>{
    db.auth.getSession().then(({data})=>{
      setSession(data.session);
      setAuthChecking(false);
    });
    const {data:{subscription}} = db.auth.onAuthStateChange((_event, sess)=>{
      setSession(sess);
    });
    return ()=>subscription.unsubscribe();
  },[]);

  /* Carregar dados sempre que houver sessão válida */
  useEffect(()=>{
    if(session) load();
    else setRecs(HIST_RECS);  /* sem sessão, mantém apenas histórico em memória (não há leitura do banco) */
  },[session]);

  /* Carga inicial: mostra spinner durante a primeira requisição */
  async function load() {
    setLoading(true);
    await fetchData();
    setLoading(false);
  }

  /* Recarga silenciosa: atualiza dados em background SEM desmontar a tela.
     Usado após salvar/excluir para que filtros, busca e scroll sejam preservados. */
  async function refresh() {
    await fetchData();
  }

  async function fetchData() {
    const {data,error}=await db.from("exportacoes").select("*").order("invoice");
    if(error) {
      if(error.message.includes("JWT") || error.code === "PGRST301") {
        notify("Sessão expirada. Faça login novamente.","err");
        await db.auth.signOut();
      } else {
        notify("Erro: "+error.message,"err");
      }
      return;
    }
    const liveRecs = (data || []).map(normalize);
    /* Deduplicar: se um registro do Supabase tem a mesma invoice que um HIST_REC,
       usar o do Supabase (mais atualizado). Se não tem match, manter ambos.
       Registros históricos sem match no Supabase são preservados. */
    const liveInvoices = new Set(liveRecs.map(r=>r.invoice));
    const histOnly = HIST_RECS.filter(r=>!liveInvoices.has(r.invoice));
    const merged = [...histOnly, ...liveRecs];
    setRecs(merged);
  }

  async function save(rec) {
    const {error}=await db.from("exportacoes").upsert(rec,{onConflict:"invoice"});
    if(error){notify("Erro ao salvar: "+error.message,"err");return false;}
    await refresh(); notify("Salvo com sucesso!"); return true;
  }

  async function remove(invoice) {
    const {error}=await db.from("exportacoes").delete().eq("invoice",invoice);
    if(error){notify("Erro ao excluir","err");return;}
    await refresh(); notify("Excluído.");
  }

  async function logout() {
    await db.auth.signOut();
    setRecs([]);
    notify("Sessão encerrada.");
  }

  /* Estados de carregamento de auth e tela de login */
  if(authChecking) {
    return <>
      <style>{CSS}</style>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"Syne,sans-serif",color:"#1A6DC8",fontSize:15,gap:12}}>
        <div style={{width:22,height:22,border:"3px solid #D8E2EB",borderTopColor:"#1A6DC8",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>
        Verificando sessão...
      </div>
    </>;
  }
  if(!session) return <Login onLogin={setSession} notify={notify}/>;

  const NAV=[
    {id:"dash",ic:IC.dash,lb:"Dashboard"},
    {id:"ops", ic:IC.ops, lb:"Operacional"},
    {id:"cart",ic:IC.cart,lb:"Carteira"},
    {id:"base",ic:IC.db,  lb:"Base de Dados"},
    {id:"rel", ic:IC.rep, lb:"Relatórios"},
  ];

  const userEmail = session.user?.email || "";
  const userInitial = userEmail.charAt(0).toUpperCase();

  return <>
    <style>{CSS}</style>
    <div className="app">
      <aside className="sidebar">
        <div className="logo">
          <h1>SALV<span>ARO</span></h1>
          <p>Export Control</p>
        </div>
        <div className="nav">
          <div className="nlbl">Navegação</div>
          {NAV.map(n=>(
            <div key={n.id} className={`ni${pg===n.id?" on":""}`} onClick={()=>setPg(n.id)}>
              {n.ic}<span>{n.lb}</span>
            </div>
          ))}
        </div>
        <div className="sft">
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,padding:"8px 4px",borderTop:"1px solid #2D3F52",borderBottom:"1px solid #2D3F52"}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:"#1A6DC8",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12,fontFamily:"Syne,sans-serif",flexShrink:0}}>{userInitial}</div>
            <div style={{flex:1,minWidth:0,overflow:"hidden"}}>
              <div style={{fontSize:11,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={userEmail}>{userEmail}</div>
              <div onClick={logout} style={{fontSize:10,color:"#94A8BA",cursor:"pointer",marginTop:2}} onMouseEnter={e=>e.target.style.color="#fff"} onMouseLeave={e=>e.target.style.color="#94A8BA"}>Sair</div>
            </div>
          </div>
          <div>v2.5 · Supabase</div>
          <div style={{color:"var(--green)",marginTop:3}}>● {recs.length} registros</div>
        </div>
      </aside>
      <main className="main">
        {loading
          ? <div className="lw"><div className="spin2"/></div>
          : <>
              {pg==="dash" && <PgDash recs={recs} yr={dashYr} setYr={setDashYr}/>}
              {pg==="ops"  && <PgOps  recs={recs} ant={opsAnt} setAnt={setOpsAnt} vig={opsVig} setVig={setOpsVig} seg={opsSeg} setSeg={setOpsSeg}/>}
              {pg==="cart" && <PgCart recs={recs} m1={cartM1} m2={cartM2} m3={cartM3}/>}
              {pg==="base" && <PgBase recs={recs} onSave={save} onDel={remove} notify={notify} q={baseQ} setQ={setBaseQ} fC={baseFC} setFC={setBaseFC} fM={baseFM} setFM={setBaseFM} fD={baseFD} setFD={setBaseFD}/>}
              {pg==="rel"  && <PgRel  recs={recs} tab={relTab} setTab={setRelTab} yr={relYr} setYr={setRelYr} mes={relMes} setMes={setRelMes}/>}
            </>
        }
      </main>
    </div>
    {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
  </>;
}

/* ══════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════ */
function PgDash({recs, yr, setYr}) {

  /* merge live data with historical */
  /* Agregar totais anuais diretamente a partir de recs (que já inclui HIST_RECS + live).
     NÃO usar {...HIST} como base, senão os anos históricos são contados duas vezes. */
  const allYears = useMemo(()=>{
    const m={};
    recs.forEach(r=>{
      const y=r.mes_ref?.split(" ")[1]; if(!y) return;
      if(!m[y]) m[y]={fat:0,cnt:0,fret:0};
      m[y].fat+=r.valor_usd||0; m[y].cnt++; m[y].fret+=r.frete_usd||0;
    });
    return m;
  },[recs]);

  const fil=useMemo(()=>yr==="TODOS"?recs:recs.filter(r=>r.mes_ref?.includes(yr)),[recs,yr]);
  const fat=fil.reduce((s,r)=>s+(r.valor_usd||0),0);
  const fret=fil.reduce((s,r)=>s+(r.frete_usd||0),0);
  const cnt=fil.length;

  /* ── YoY: mesmo período do ano anterior ── */
  const prevYr = yr==="TODOS"?null:String(parseInt(yr)-1);
  const filPrev = useMemo(()=>{
    if(!prevYr) return [];
    /* Se estamos no meio do ano, comparar até o último mês disponível do ano atual */
    const mesesAtual = new Set(fil.map(r=>r.mes_ref?.split(" ")[0]).filter(Boolean));
    return recs.filter(r=>{
      if(!r.mes_ref?.includes(prevYr)) return false;
      const mes = r.mes_ref.split(" ")[0];
      return mesesAtual.has(mes);
    });
  },[recs,yr,prevYr,fil]);
  const fatPrev=filPrev.reduce((s,r)=>s+(r.valor_usd||0),0);
  const fretPrev=filPrev.reduce((s,r)=>s+(r.frete_usd||0),0);
  const cntPrev=filPrev.length;

  /* Badge de variação YoY */
  const YoY = ({cur, prev, invert=false}) => {
    if(!prev || !prevYr || yr==="TODOS") return null;
    const pct = ((cur/prev)-1)*100;
    const up = pct >= 0;
    const good = invert ? !up : up;
    const color = good ? "#059669" : "#DC2626";
    const arrow = up ? "▲" : "▼";
    return <div style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:11,fontWeight:600,color,marginTop:4}}>
      <span>{arrow}</span>
      <span>{Math.abs(pct).toFixed(1)}%</span>
      <span style={{fontWeight:400,color:"var(--text3)",fontSize:10}}>vs {prevYr}</span>
    </div>;
  };

  const byMonth=useMemo(()=>{
    const m={};
    fil.forEach(r=>{const k=r.mes_ref||"?";if(!m[k])m[k]={v:0,mes:k.split(" ")[0],ano:k.split(" ")[1]||""};m[k].v+=r.valor_usd||0;});
    return Object.entries(m).sort(([,a],[,b])=>MESES.indexOf(a.mes)-MESES.indexOf(b.mes)).map(([,v])=>({l:v.mes.slice(0,3)+"/"+v.ano.slice(2),v:v.v}));
  },[fil]);

  /* Série cronológica para gráfico de linha (modo TODOS) */
  const byMonthChrono=useMemo(()=>{
    if(yr!=="TODOS") return [];
    const m={};
    fil.forEach(r=>{
      const k=r.mes_ref||"?";
      if(!m[k]) m[k]={v:0,mes:k.split(" ")[0],ano:k.split(" ")[1]||""};
      m[k].v+=r.valor_usd||0;
    });
    return Object.entries(m)
      .map(([k,v])=>({l:v.mes.slice(0,3)+"/"+v.ano.slice(2),v:v.v,ano:v.ano,mesIdx:MESES.indexOf(v.mes),full:k}))
      .sort((a,b)=>a.ano===b.ano?a.mesIdx-b.mesIdx:a.ano.localeCompare(b.ano));
  },[fil,yr]);

  const byCli=useMemo(()=>{
    const m={};fil.forEach(r=>{const c=r.cliente||"—";m[c]=(m[c]||0)+(r.valor_usd||0);});
    return Object.entries(m).sort(([,a],[,b])=>b-a).map(([l,v])=>({l,v}));
  },[fil]);

  const byDst=useMemo(()=>{
    const m={};fil.forEach(r=>{const d=r.destino||"—";m[d]=(m[d]||0)+1;});
    return Object.entries(m).sort(([,a],[,b])=>b-a).map(([l,v])=>({l,v}));
  },[fil]);

  const docSt=useMemo(()=>{
    const m={COMPLETO:0,"FALTA BL":0,PENDENTE:0};
    fil.forEach(r=>{const k=r.status_doc||"PENDENTE";m[k]=(m[k]||0)+1;});
    return Object.entries(m).filter(([,v])=>v>0).map(([l,v])=>({l,v}));
  },[fil]);

  /* annual table with historical + live data */
  const annual=useMemo(()=>{
    return Object.entries(allYears).sort().map(([ano,v])=>({ano,...v}));
  },[allYears]);

  /* years available for filter — derivado diretamente de recs (já inclui históricos) */
  const allYearKeys=useMemo(()=>{
    const s=new Set(); recs.forEach(r=>{const y=r.mes_ref?.split(" ")[1];if(y)s.add(y);}); return [...s].sort();
  },[recs]);

  return <div className="page">
    <div className="ph">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div><h2>Dashboard Geral</h2><p>Visão consolidada de exportações Salvaro</p></div>
        <select className="sel" value={yr} onChange={e=>setYr(e.target.value)}>
          <option value="TODOS">Todos os anos</option>
          {allYearKeys.map(a=><option key={a}>{a}</option>)}
        </select>
      </div>
    </div>
    <div className="kg">
      <div className="kp hi"><div className="kl">Faturamento USD</div><div className="kv tc" style={{fontSize:20}}>{fmtUSD(fat)}</div><div className="ks">{yr}</div><YoY cur={fat} prev={fatPrev}/></div>
      <div className="kp"><div className="kl">Containers</div><div className="kv">{cnt}</div><div className="ks">embarques</div><YoY cur={cnt} prev={cntPrev}/></div>
      <div className="kp"><div className="kl">Média / CNTR</div><div className="kv gc" style={{fontSize:20}}>{fmtUSD(cnt?fat/cnt:0)}</div><YoY cur={cnt?fat/cnt:0} prev={cntPrev?fatPrev/cntPrev:0}/></div>
      <div className="kp"><div className="kl">Frete Total</div><div className="kv" style={{fontSize:20}}>{fmtUSD(fret)}</div><div className="ks">{fat?((fret/fat)*100).toFixed(1)+"%":"—"} do fat.</div><YoY cur={fret} prev={fretPrev} invert={true}/></div>
      <div className="kp"><div className="kl">Clientes</div><div className="kv gr">{byCli.length}</div><div className="ks">no período</div></div>
    </div>
    {yr==="TODOS" ? <>
      <div className="card mb20">
        <div className="ct">Evolução mensal do faturamento (2015 – presente)</div>
        <LineChart data={byMonthChrono} fmt={v=>"$"+Math.round(v/1000)+"k"} height={260}/>
      </div>
      <div className="g2 mb20">
        <div className="card"><div className="ct">Faturamento por Cliente</div><Bar data={byCli} color="#D97706" fmt={v=>"$"+Math.round(v/1000)+"k"} total={fat}/></div>
        <div className="card"><div className="ct">Destinos (containers)</div><Donut data={byDst}/></div>
      </div>
    </> : <>
      <div className="g2 mb20">
        <div className="card"><div className="ct">Faturamento por Mês</div><Bar data={byMonth} fmt={v=>"$"+Math.round(v/1000)+"k"}/></div>
        <div className="card"><div className="ct">Faturamento por Cliente</div><Bar data={byCli} color="#D97706" fmt={v=>"$"+Math.round(v/1000)+"k"} total={fat}/></div>
      </div>
      <div className="g2 mb20">
        <div className="card"><div className="ct">Destinos (containers)</div><Donut data={byDst}/></div>
        <div className="card"><div className="ct">Status Documentação</div><Donut data={docSt}/></div>
      </div>
    </>}
    <div className="card">
      <div className="ct">Histórico Anual (2015 – presente)</div>
      <div className="tw"><table>
        <thead><tr><th>Ano</th><th>Faturamento</th><th>Δ YoY</th><th>Containers</th><th>Média/CNTR</th><th>Frete Total</th><th>% Frete/Fat</th></tr></thead>
        <tbody>{annual.map((r,i)=>{
          const prev = i>0 ? annual[i-1] : null;
          const yoy = prev && prev.fat>0 ? ((r.fat/prev.fat)-1)*100 : null;
          const yoyColor = yoy===null ? "var(--text3)" : yoy>=0 ? "#059669" : "#DC2626";
          const yoyStr = yoy===null ? "—" : (yoy>=0?"+":"")+yoy.toFixed(1)+"%";
          return <tr key={r.ano} style={r.ano>="2025"?{fontWeight:500}:{}}>
            <td><strong>{r.ano}</strong>{r.ano<"2025"&&<span style={{fontSize:10,color:"#94A8BA",marginLeft:6}}>hist.</span>}</td>
            <td className="r">{fmtUSD(r.fat)}</td>
            <td className="r" style={{color:yoyColor,fontWeight:500,fontSize:12}}>{yoyStr}</td>
            <td className="r">{r.cnt}</td>
            <td className="r">{fmtUSD(r.cnt?r.fat/r.cnt:0)}</td><td className="r">{fmtUSD(r.fret)}</td>
            <td className="r">{r.fat?((r.fret/r.fat)*100).toFixed(1)+"%":"—"}</td>
          </tr>;
        })}</tbody>
      </table></div>
    </div>
  </div>;
}

/* ══════════════════════════════════════════
   OPERACIONAL
══════════════════════════════════════════ */
function PgOps({recs, ant, setAnt, vig, setVig, seg, setSeg}) {
  const avail=useMemo(()=>{const s=new Set();recs.forEach(r=>{if(r.mes_ref)s.add(r.mes_ref)});return [...s].sort();},[recs]);

  function getRows(mes){ return recs.filter(r=>r.mes_ref===mes).sort((a,b)=>(a.invoice||0)-(b.invoice||0)); }

  const Sec=({title,mes,col})=>{
    const rows=getRows(mes);
    const tot=rows.reduce((s,r)=>s+(r.valor_usd||0),0);
    const today=new Date(); today.setHours(0,0,0,0);
    const in3d=new Date(today); in3d.setDate(in3d.getDate()+3);

    /* Determinar alerta para uma data */
    function dateAlert(dateStr, blockerField, rec) {
      if(!dateStr) return "missing";
      const d=new Date(dateStr+"T00:00:00");
      if(isNaN(d)) return "none";
      if(d < today) {
        /* Data vencida — vermelho se blocker ainda não preenchido */
        if(blockerField && !rec[blockerField]) return "overdue";
        if(!blockerField) return "overdue";
        return "done";
      }
      if(d <= in3d) return "soon";
      return "none";
    }

    /* Estilos por nível de alerta */
    const alertStyle = (level) => {
      switch(level) {
        case "overdue": return {background:"#FEF2F2",color:"#991B1B",fontWeight:600};
        case "soon": return {background:"#FFFBEB",color:"#92400E",fontWeight:600};
        case "missing": return {color:"#D1D5DB",fontStyle:"italic"};
        default: return {};
      }
    };

    /* Contagem de alertas */
    const alerts = rows.reduce((a,r) => {
      if(dateAlert(r.eta_pedido,null,r)==="overdue") a.overdue++;
      if(dateAlert(r.dl_carga,"booking",r)==="overdue") a.overdue++;
      if(dateAlert(r.estufagem,"container",r)==="overdue") a.overdue++;
      if(dateAlert(r.dl_carga,"booking",r)==="soon") a.soon++;
      if(dateAlert(r.estufagem,"container",r)==="soon") a.soon++;
      return a;
    },{overdue:0,soon:0});

    return <div className="card mb20">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:9,height:9,borderRadius:"50%",background:col}}/>
          <span className="ct" style={{marginBottom:0}}>{title}</span>
          <strong style={{fontSize:14,color:"var(--text)"}}>{mes}</strong>
          <span style={{color:"var(--text2)",fontSize:12}}>— {rows.length} embarques — {fmtUSD(tot)}</span>
        </div>
        <div style={{display:"flex",gap:8}}>
          {alerts.overdue>0&&<span style={{background:"#FEF2F2",color:"#991B1B",fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:12,border:"1px solid #FECACA"}}>⚠ {alerts.overdue} vencido{alerts.overdue>1?"s":""}</span>}
          {alerts.soon>0&&<span style={{background:"#FFFBEB",color:"#92400E",fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:12,border:"1px solid #FDE68A"}}>⏳ {alerts.soon} próximo{alerts.soon>1?"s":""}</span>}
        </div>
      </div>
      <div className="tw"><table className="ops-table">
        <colgroup>
          <col style={{width:"2.5%"}}/>
          <col style={{width:"5%"}}/>
          <col style={{width:"10%"}}/>
          <col style={{width:"8%"}}/>
          <col style={{width:"3.5%"}}/>
          <col style={{width:"8%"}}/>
          <col style={{width:"5%"}}/>
          <col style={{width:"9%"}}/>
          <col style={{width:"7%"}}/>
          <col style={{width:"10%"}}/>
          <col style={{width:"10%"}}/>
          <col style={{width:"6.5%"}}/>
          <col style={{width:"6.5%"}}/>
          <col style={{width:"5.5%"}}/>
        </colgroup>
        <thead><tr><th>Nº</th><th>Invoice</th><th>Cliente</th><th>PO#</th><th>NF</th><th>Destino</th><th>ETA</th><th>Agente</th><th>Booking</th><th>Container</th><th>Navio</th><th>DL Carga</th><th>Estufagem</th><th>Transp.</th></tr></thead>
        <tbody>{rows.length===0
          ?<tr><td colSpan={14} className="empty">Nenhum embarque neste período</td></tr>
          :rows.map((r,i)=>{
            const etaLvl=dateAlert(r.eta_pedido,null,r);
            const dlLvl=dateAlert(r.dl_carga,"booking",r);
            const estLvl=dateAlert(r.estufagem,"container",r);
            const estDone = ["NO PORTO","EMBARCADO","ENTREGUE"].includes(r.status);
            return <tr key={r.invoice}>
              <td className="m">{r.nr||i+1}</td><td><strong>{r.invoice}</strong></td>
              <td>{r.cliente||"—"}</td><td className="m">{fmtInt(r.po)}</td><td>{fmtInt(r.nf)}</td>
              <td>{r.destino||"—"}</td>
              <td style={alertStyle(etaLvl)}>{fmtDate(r.eta_pedido)}{etaLvl==="overdue"&&" ⚠"}</td>
              <td>{r.agente?.split(" -")[0]||"—"}</td><td className="m">{fmtInt(r.booking)}</td>
              <td>{r.container||"—"}</td><td className="m">{r.navio||"—"}</td>
              <td style={alertStyle(dlLvl)}>{fmtDate(r.dl_carga)}{dlLvl==="overdue"&&" ⚠"}{dlLvl==="soon"&&" ⏳"}</td>
              <td style={estDone?{color:"#059669",fontWeight:600}:alertStyle(estLvl)}>{fmtDate(r.estufagem)}{estDone&&" ✓"}{!estDone&&estLvl==="overdue"&&" ⚠"}{!estDone&&estLvl==="soon"&&" ⏳"}</td>
              <td className="m">{r.transportadora||"—"}</td>
            </tr>;
          })
        }</tbody>
      </table></div>
    </div>;
  };

  return <div className="page">
    <div className="ph">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div><h2>Controle Operacional</h2><p>Mês anterior, vigente e seguinte</p></div>
        <button className="btn bgx bsm" onClick={()=>exportOperacionalXLS(ant,getRows(ant),vig,getRows(vig),seg,getRows(seg))}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exportar Excel (3 meses)
        </button>
      </div>
    </div>
    <div className="card mb20">
      <div className="sel-grid">
        {[["Mês Anterior",ant,setAnt,"#D97706"],["Mês Vigente",vig,setVig,"#1A6DC8"],["Mês Seguinte",seg,setSeg,"#059669"]].map(([lb,val,set,col])=>(
          <div key={lb}>
            <div style={{fontSize:11,fontWeight:600,color:"var(--text2)",letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>{lb}</div>
            <select className="sel" style={{width:"100%",borderColor:col+"66"}} value={val} onChange={e=>set(e.target.value)}>
              {avail.map(m=><option key={m}>{m}</option>)}
            </select>
          </div>
        ))}
      </div>
    </div>
    <Sec title="MÊS ANTERIOR" mes={ant} col="#D97706"/>
    <Sec title="MÊS VIGENTE"  mes={vig} col="#1A6DC8"/>
    <Sec title="MÊS SEGUINTE" mes={seg} col="#059669"/>
  </div>;
}

/* ══════════════════════════════════════════
   CARTEIRA — BI Dashboard para diretoria
══════════════════════════════════════════ */
function PgCart({recs, m1, m2, m3}) {
  const [expanded,setExpanded]=useState(null); /* which month is expanded */

  function getCartRows(mes){ return recs.filter(r=>r.mes_ref===mes).sort((a,b)=>(a.invoice||0)-(b.invoice||0)); }

  /* Dados agregados dos 3 meses */
  const months = useMemo(()=>{
    return [
      {key:"m1",label:m1,color:"#D97706",rows:getCartRows(m1)},
      {key:"m2",label:m2,color:"#1A6DC8",rows:getCartRows(m2)},
      {key:"m3",label:m3,color:"#059669",rows:getCartRows(m3)},
    ].map(m=>({
      ...m,
      cnt:m.rows.length,
      fat:m.rows.reduce((s,r)=>s+(r.valor_usd||0),0),
      byCli:(()=>{const c={};m.rows.forEach(r=>{const k=r.cliente||"—";c[k]=(c[k]||0)+(r.valor_usd||0)});return Object.entries(c).sort(([,a],[,b])=>b-a).map(([l,v])=>({l,v}));})(),
      byDst:(()=>{const d={};m.rows.forEach(r=>{const k=r.destino||"—";d[k]=(d[k]||0)+1});return Object.entries(d).sort(([,a],[,b])=>b-a).map(([l,v])=>({l,v}));})(),
    }));
  },[recs,m1,m2,m3]);

  const totalFat = months.reduce((s,m)=>s+m.fat,0);
  const totalCnt = months.reduce((s,m)=>s+m.cnt,0);

  /* ── Mini bar chart SVG (horizontal, 3 barras) ── */
  const BarCompare = ({data, fmt, label}) => {
    const max = Math.max(...data.map(d=>d.v),1);
    return <div>
      <div style={{fontSize:10,fontWeight:600,color:"var(--text3)",letterSpacing:.5,textTransform:"uppercase",marginBottom:8}}>{label}</div>
      {data.map((d,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:d.c,flexShrink:0}}/>
          <div style={{width:50,fontSize:11,color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.l}</div>
          <div style={{flex:1,height:6,background:"#EEF2F6",borderRadius:3,overflow:"hidden"}}>
            <div style={{width:`${(d.v/max)*100}%`,height:"100%",background:d.c,borderRadius:3,transition:"width .4s"}}/>
          </div>
          <div style={{fontSize:11,fontWeight:600,color:"var(--text)",minWidth:60,textAlign:"right"}}>{fmt(d.v)}</div>
        </div>
      ))}
    </div>;
  };

  /* ── Donut simples (clientes ou destinos) ── */
  const MiniDonut = ({data, color}) => {
    const total=data.reduce((s,d)=>s+d.v,0);
    if(!total) return null;
    const r=28,cx=35,cy=35,circ=2*Math.PI*r;
    const COLS=["#1A6DC8","#D97706","#059669","#EA580C","#7C3AED","#DC2626","#DB2777","#0891B2"];
    let off=0;
    const segs=data.slice(0,6).map((d,i)=>{const pct=d.v/total,dash=pct*circ,seg={...d,dash,off:off*circ,c:COLS[i%COLS.length]};off+=pct;return seg;});
    return <div style={{display:"flex",alignItems:"center",gap:10}}>
      <svg width="70" height="70" viewBox="0 0 70 70" style={{flexShrink:0}}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#EEF2F6" strokeWidth="10"/>
        {segs.map((s,i)=><circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.c} strokeWidth="10"
          strokeDasharray={`${s.dash} ${circ-s.dash}`} strokeDashoffset={circ/4-s.off}/>)}
        <text x={cx} y={cy+4} textAnchor="middle" fill="var(--text)" fontSize="11" fontWeight="700" fontFamily="Syne">{total}</text>
      </svg>
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {segs.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:5,fontSize:10}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:s.c,flexShrink:0}}/>
          <span style={{color:"var(--text2)"}}>{s.l}</span>
          <span style={{marginLeft:"auto",fontWeight:600,color:"var(--text)",paddingLeft:6}}>{s.v}</span>
        </div>)}
      </div>
    </div>;
  };

  /* ── Card de mês (colapsável) ── */
  const MesCard = ({m, idx}) => {
    const isOpen = expanded === idx;
    const avg = m.cnt ? m.fat / m.cnt : 0;
    const pctTotal = totalFat ? (m.fat / totalFat * 100) : 0;
    return <div className="card" style={{border:isOpen?`2px solid ${m.color}`:"1px solid var(--border)",transition:"border .2s"}}>
      {/* Header com KPIs inline */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",marginBottom:isOpen?12:0}} onClick={()=>setExpanded(isOpen?null:idx)}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:10,height:10,borderRadius:"50%",background:m.color,flexShrink:0}}/>
          <strong style={{fontSize:14,color:"var(--text)"}}>{m.label}</strong>
          <span style={{fontSize:11,color:"var(--text3)",marginLeft:4}}>{m.cnt} pedidos</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"Syne",fontSize:16,fontWeight:700,color:m.color}}>{fmtUSD(m.fat)}</div>
            <div style={{fontSize:10,color:"var(--text3)"}}>{pctTotal.toFixed(1)}% da carteira</div>
          </div>
          <div style={{fontSize:16,color:"var(--text3)",transition:"transform .2s",transform:isOpen?"rotate(180deg)":"rotate(0deg)"}}>▾</div>
        </div>
      </div>

      {/* Conteúdo expandido */}
      {isOpen && <>
        {/* KPIs do mês */}
        <div className="kpi-grid4" style={{padding:"10px 0",borderTop:"1px solid var(--border)",borderBottom:"1px solid var(--border)",marginBottom:14}}>
          <div><div style={{fontSize:10,color:"var(--text3)",fontWeight:600,letterSpacing:.4,textTransform:"uppercase"}}>Pedidos</div><div style={{fontFamily:"Syne",fontSize:18,fontWeight:700,color:"var(--text)"}}>{m.cnt}</div></div>
          <div><div style={{fontSize:10,color:"var(--text3)",fontWeight:600,letterSpacing:.4,textTransform:"uppercase"}}>Faturamento</div><div style={{fontFamily:"Syne",fontSize:14,fontWeight:700,color:m.color}}>{fmtUSD(m.fat)}</div></div>
          <div><div style={{fontSize:10,color:"var(--text3)",fontWeight:600,letterSpacing:.4,textTransform:"uppercase"}}>Média/CNTR</div><div style={{fontFamily:"Syne",fontSize:14,fontWeight:700,color:"var(--text)"}}>{fmtUSD(avg)}</div></div>
          <div><div style={{fontSize:10,color:"var(--text3)",fontWeight:600,letterSpacing:.4,textTransform:"uppercase"}}>% Carteira</div><div style={{fontFamily:"Syne",fontSize:14,fontWeight:700,color:"var(--text)"}}>{pctTotal.toFixed(1)}%</div></div>
        </div>

        {/* Gráficos: clientes + destinos lado a lado */}
        <div className="g2" style={{marginBottom:14}}>
          <div>
            <div style={{fontSize:10,fontWeight:600,color:"var(--text3)",letterSpacing:.5,textTransform:"uppercase",marginBottom:6}}>Por Cliente</div>
            {m.byCli.map((c,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                <div style={{width:50,fontSize:11,color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.l}</div>
                <div style={{flex:1,height:5,background:"#EEF2F6",borderRadius:3,overflow:"hidden"}}><div style={{width:`${(c.v/m.fat)*100}%`,height:"100%",background:m.color,borderRadius:3}}/></div>
                <div style={{fontSize:10,fontWeight:600,color:"var(--text)",minWidth:40,textAlign:"right"}}>{(c.v/m.fat*100).toFixed(0)}%</div>
              </div>
            ))}
          </div>
          <div>
            <div style={{fontSize:10,fontWeight:600,color:"var(--text3)",letterSpacing:.5,textTransform:"uppercase",marginBottom:6}}>Destinos</div>
            <MiniDonut data={m.byDst}/>
          </div>
        </div>

        {/* Tabela de pedidos */}
        <div className="tw" style={{borderRadius:8}}>
          <table className="cart-table">
            <thead><tr>
              <th>Invoice</th><th>Cliente</th><th>PO#</th><th>Destino</th>
              <th style={{textAlign:"right"}}>Valor USD</th><th>ETA</th><th>Status</th>
            </tr></thead>
            <tbody>{m.rows.map(r=>(
              <tr key={r.invoice}>
                <td><strong style={{color:m.color}}>{r.invoice}</strong></td>
                <td style={{color:"var(--text2)"}}>{r.cliente||"—"}</td>
                <td style={{color:"var(--text2)"}}>{fmtInt(r.po)}</td>
                <td>{r.destino||"—"}</td>
                <td style={{textAlign:"right",fontVariantNumeric:"tabular-nums",fontWeight:500}}>{fmtUSD(r.valor_usd)}</td>
                <td style={{color:"var(--text2)"}}>{fmtDate(r.eta_pedido)}</td>
                <td><EmbBadge v={r.status}/></td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </>}
    </div>;
  };

  return <div className="page">
    <div className="ph">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div><h2>Carteira de Pedidos</h2><p>Programação de embarques por período</p></div>
        <button className="btn bgx bsm" onClick={()=>exportCarteiraXLS(m1,getCartRows(m1),m2,getCartRows(m2),m3,getCartRows(m3))}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exportar Excel
        </button>
      </div>
    </div>

    {/* Período automático: mês vigente + 2 próximos */}

    {/* KPIs consolidados — visão rápida dos 3 meses */}
    <div className="kpi-grid4" style={{marginBottom:16}}>
      <div className="kp hi"><div className="kl">Total Carteira</div><div className="kv tc" style={{fontSize:18}}>{fmtUSD(totalFat)}</div><div className="ks">{totalCnt} containers em 3 meses</div></div>
      {months.map((m,i)=>(
        <div key={i} className="kp"><div className="kl" style={{color:m.color}}>{m.label.split(" ")[0]}/{m.label.split(" ")[1]?.slice(2)}</div><div className="kv" style={{fontSize:16,color:m.color}}>{fmtUSD(m.fat)}</div><div className="ks">{m.cnt} pedidos</div></div>
      ))}
    </div>

    {/* Gráfico comparativo: faturamento + containers dos 3 meses */}
    <div className="g2 mb20">
      <div className="card">
        <BarCompare label="Faturamento por Mês" data={months.map(m=>({l:m.label.split(" ")[0],v:m.fat,c:m.color}))} fmt={v=>"$"+Math.round(v/1000)+"k"}/>
      </div>
      <div className="card">
        <BarCompare label="Containers por Mês" data={months.map(m=>({l:m.label.split(" ")[0],v:m.cnt,c:m.color}))} fmt={v=>v+" CNTR"}/>
      </div>
    </div>

    {/* Cards dos 3 meses — colapsáveis */}
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {months.map((m,i)=> <MesCard key={i} m={m} idx={i}/> )}
    </div>
  </div>;
}

/* ══════════════════════════════════════════
   BASE DE DADOS
══════════════════════════════════════════ */
function PgBase({recs:allRecs,onSave,onDel,notify, q,setQ, fC,setFC, fM,setFM, fD,setFD}) {
  /* Base de dados editável só mostra registros ao vivo (não-históricos) */
  const recs = useMemo(()=>allRecs.filter(r=>!r._hist),[allRecs]);
  const [modal,setModal]=useState(null); const [del,setDel]=useState(null); const [saving,setSaving]=useState(false);
  const avail=useMemo(()=>{const s=new Set();recs.forEach(r=>{if(r.mes_ref)s.add(r.mes_ref)});return [...s].sort();},[recs]);
  const fil=useMemo(()=>recs.filter(r=>{
    if(q&&!String(r.invoice).includes(q)&&!(r.cliente||"").toLowerCase().includes(q.toLowerCase())&&!(r.navio||"").toLowerCase().includes(q.toLowerCase())) return false;
    if(fC&&r.cliente!==fC) return false;
    if(fM&&r.mes_ref!==fM) return false;
    if(fD&&r.status_doc!==fD) return false;
    return true;
  }),[recs,q,fC,fM,fD]);

  const E0={invoice:"",cliente:"",po:"",nf:"",porto_carga:"IMBITUBA",destino:"",navio:"",container:"",booking:"",transportadora:"",valor_usd:"",frete_usd:"",agente:"",isf_docs:"",bl:"",status_doc:"PENDENTE",dl_carga:"",estufagem:"",eta_pedido:"",status:"",mes_ref:""};
  const [form,setForm]=useState(E0);
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));

  function openEdit(r){setForm({invoice:r.invoice||"",cliente:r.cliente||"",po:r.po||"",nf:r.nf||"",porto_carga:r.porto_carga||"IMBITUBA",destino:r.destino||"",navio:r.navio||"",container:r.container||"",booking:r.booking||"",transportadora:r.transportadora||"",valor_usd:r.valor_usd||"",frete_usd:r.frete_usd||"",agente:r.agente||"",isf_docs:r.isf_docs||"",bl:r.bl||"",status_doc:r.status_doc||"PENDENTE",dl_carga:r.dl_carga||"",estufagem:r.estufagem||"",eta_pedido:r.eta_pedido||"",status:r.status||"",mes_ref:r.mes_ref||""});setModal(r);}

  /* Estado para confirmação de sobrescrita por duplicidade */
  const [dupConfirm,setDupConfirm]=useState(null);

  /* Construção do payload final que será enviado ao Supabase */
  function buildPayload(){
    return {...form,invoice:parseInt(form.invoice),valor_usd:parseFloat(form.valor_usd)||null,frete_usd:parseFloat(form.frete_usd)||null,isf_docs:form.isf_docs||null,bl:form.bl||null,dl_carga:form.dl_carga||null,estufagem:form.estufagem||null,eta_pedido:form.eta_pedido||null};
  }

  /* Persistência efetiva — chamada após validações */
  async function doSave(payload){
    setSaving(true);
    const ok=await onSave(payload);
    setSaving(false);
    if(ok){setModal(null);setDupConfirm(null);}
    return ok;
  }

  async function hSave(){
    if(!form.invoice){notify("Invoice obrigatório","err");return;}
    if(!form.mes_ref){notify("Mês de referência obrigatório","err");return;}

    const newInv=parseInt(form.invoice);
    if(isNaN(newInv)||newInv<=0){notify("Invoice deve ser número positivo","err");return;}

    /* Detectar duplicidade ANTES de salvar
       - "new": qualquer match em recs ao vivo (não-histórico) é duplicata
       - editando: só é duplicata se a invoice mudou para uma que já existe em outro registro */
    const isNew=modal==="new";
    const originalInv=isNew?null:(modal&&modal.invoice);
    const invChanged=!isNew&&newInv!==originalInv;

    if(isNew||invChanged){
      const conflito=allRecs.find(r=>!r._hist&&r.invoice===newInv);
      if(conflito){
        setDupConfirm({existing:conflito,payload:buildPayload()});
        return;
      }
    }

    await doSave(buildPayload());
  }

  return <div className="page">
    <div className="ph">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
        <div><h2>Base de Dados</h2><p>{recs.length} registros · {fil.length} exibidos</p></div>
        <button className="btn bp" onClick={()=>{setForm(E0);setModal("new")}}>+ Novo Embarque</button>
      </div>
    </div>
    <div className="fb">
      <input placeholder="Buscar invoice, cliente, navio..." value={q} onChange={e=>setQ(e.target.value)} style={{width:260}}/>
      <select value={fC} onChange={e=>setFC(e.target.value)}><option value="">Todos os clientes</option>{CLIENTES.map(c=><option key={c}>{c}</option>)}</select>
      <select value={fM} onChange={e=>setFM(e.target.value)}><option value="">Todos os meses</option>{avail.map(m=><option key={m}>{m}</option>)}</select>
      <select value={fD} onChange={e=>setFD(e.target.value)}><option value="">Todos status doc</option>{STATUS_DOC.map(s=><option key={s}>{s}</option>)}</select>
      <button className="btn bg2 bsm" onClick={()=>{setQ("");setFC("");setFM("");setFD("")}}>Limpar</button>
    </div>
    <div className="card">
      <div className="tw"><table>
        <thead><tr><th>Invoice</th><th>Mês Ref</th><th>Cliente</th><th>Destino</th><th>Valor USD</th><th>Frete USD</th><th>Agente</th><th>Container</th><th>ETA</th><th>Status Doc</th><th>Status</th><th></th></tr></thead>
        <tbody>
          {fil.length===0?<tr><td colSpan={12} className="empty">Nenhum registro encontrado</td></tr>
          :fil.map(r=><tr key={r.invoice} onClick={()=>openEdit(r)}>
            <td><strong style={{color:"var(--blue)"}}>{r.invoice}</strong></td>
            <td className="m">{r.mes_ref}</td>
            <td>{r.cliente}</td><td>{r.destino||"—"}</td>
            <td className="r">{fmtUSD(r.valor_usd)}</td><td className="r">{fmtUSD(r.frete_usd)}</td>
            <td className="m">{r.agente?.split(" -")[0]||"—"}</td><td className="m">{r.container||"—"}</td>
            <td>{fmtDate(r.eta_pedido)}</td>
            <td><DocBadge v={r.status_doc}/></td><td><EmbBadge v={r.status}/></td>
            <td onClick={e=>{e.stopPropagation();setDel(r)}}><button className="btn bd bsm">✕</button></td>
          </tr>)}
        </tbody>
      </table></div>
    </div>

    {modal&&<div className="overlay" onClick={()=>setModal(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="mh"><h3>{modal==="new"?"Novo Embarque":"Editar — INV "+modal.invoice}</h3><button className="btn bg2 bsm" onClick={()=>setModal(null)}>✕</button></div>
        <div className="mb2">
          <div className="st">Identificação</div>
          <div className="fr mb16"><Field label="Invoice *" field="invoice" type="number" form={form} upd={upd}/><Field label="Mês Ref *" field="mes_ref" opts={ALL_MONTHS} form={form} upd={upd}/><Field label="Cliente" field="cliente" opts={CLIENTES} form={form} upd={upd}/><Field label="PO#" field="po" form={form} upd={upd}/><Field label="NF" field="nf" form={form} upd={upd}/></div>
          <hr className="dv"/>
          <div className="st">Logística</div>
          <div className="fr mb16"><Field label="Porto de Carga" field="porto_carga" opts={PORTOS} form={form} upd={upd}/><Field label="Destino" field="destino" opts={DESTINOS} form={form} upd={upd}/><Field label="Navio" field="navio" form={form} upd={upd}/><Field label="Container" field="container" form={form} upd={upd}/><Field label="Booking" field="booking" form={form} upd={upd}/><Field label="Transportadora" field="transportadora" opts={TRANSP} form={form} upd={upd}/></div>
          <hr className="dv"/>
          <div className="st">Financeiro</div>
          <div className="fr mb16"><Field label="Valor USD" field="valor_usd" type="number" form={form} upd={upd}/><Field label="Frete USD" field="frete_usd" type="number" form={form} upd={upd}/><Field label="Agente" field="agente" form={form} upd={upd}/></div>
          <hr className="dv"/>
          <div className="st">Documentação e Datas</div>
          <div className="fr"><Field label="ISF/DOCS" field="isf_docs" type="date" form={form} upd={upd}/><Field label="BL" field="bl" type="date" form={form} upd={upd}/><Field label="Status Doc" field="status_doc" opts={STATUS_DOC} form={form} upd={upd}/><Field label="DL Carga" field="dl_carga" type="date" form={form} upd={upd}/><Field label="Estufagem" field="estufagem" type="date" form={form} upd={upd}/><Field label="ETA Pedido" field="eta_pedido" type="date" form={form} upd={upd}/><Field label="Status" field="status" opts={STATUS_EMB} form={form} upd={upd}/></div>
          <div className="mac"><button className="btn bg2" onClick={()=>setModal(null)}>Cancelar</button><button className="btn bp" onClick={hSave} disabled={saving}>{saving?"Salvando...":"Salvar"}</button></div>
        </div>
      </div>
    </div>}
    {del&&<div className="overlay" onClick={()=>setDel(null)}>
      <div className="modal" style={{maxWidth:380}} onClick={e=>e.stopPropagation()}>
        <div className="mh"><h3>Confirmar Exclusão</h3></div>
        <div className="mb2">
          <p>Excluir <strong>INV {del.invoice}</strong> ({del.cliente})?</p>
          <p style={{fontSize:12,color:"var(--text2)",marginTop:8}}>Esta ação não pode ser desfeita.</p>
          <div className="mac"><button className="btn bg2" onClick={()=>setDel(null)}>Cancelar</button><button className="btn bd" onClick={()=>{onDel(del.invoice);setDel(null)}}>Excluir</button></div>
        </div>
      </div>
    </div>}
    {dupConfirm&&<div className="overlay" onClick={()=>setDupConfirm(null)}>
      <div className="modal" style={{maxWidth:480}} onClick={e=>e.stopPropagation()}>
        <div className="mh"><h3 style={{color:"var(--red)"}}>⚠ Invoice já existe</h3></div>
        <div className="mb2">
          <p style={{marginBottom:14}}>Já existe um embarque cadastrado com a invoice <strong style={{color:"var(--blue)"}}>{dupConfirm.existing.invoice}</strong>:</p>
          <div style={{background:"#FEF8F0",border:"1px solid #FBBF24",borderRadius:8,padding:"12px 14px",marginBottom:14}}>
            <div style={{display:"grid",gridTemplateColumns:"100px 1fr",gap:"6px 10px",fontSize:13}}>
              <div style={{color:"var(--text2)"}}>Cliente:</div><div><strong>{dupConfirm.existing.cliente||"—"}</strong></div>
              <div style={{color:"var(--text2)"}}>Mês Ref:</div><div>{dupConfirm.existing.mes_ref||"—"}</div>
              <div style={{color:"var(--text2)"}}>Destino:</div><div>{dupConfirm.existing.destino||"—"}</div>
              <div style={{color:"var(--text2)"}}>Valor USD:</div><div>{fmtUSD(dupConfirm.existing.valor_usd)}</div>
              <div style={{color:"var(--text2)"}}>Container:</div><div className="m">{dupConfirm.existing.container||"—"}</div>
            </div>
          </div>
          <p style={{fontSize:13,color:"var(--text2)",marginBottom:6}}>Se você confirmar, <strong style={{color:"var(--red)"}}>os dados acima serão substituídos</strong> pelos dados do formulário. Essa ação <strong>não pode ser desfeita</strong>.</p>
          <p style={{fontSize:12,color:"var(--text3)",marginBottom:14}}>Se foi um erro de digitação na invoice, clique em "Voltar" e corrija o número.</p>
          <div className="mac"><button className="btn bg2" onClick={()=>setDupConfirm(null)}>← Voltar e corrigir</button><button className="btn bd" disabled={saving} onClick={()=>doSave(dupConfirm.payload)}>{saving?"Substituindo...":"Substituir mesmo assim"}</button></div>
        </div>
      </div>
    </div>}
  </div>;
}

/* ══════════════════════════════════════════
   RELATÓRIOS
══════════════════════════════════════════ */
function PgRel({recs, tab, setTab, yr, setYr, mes, setMes}) {
  const avail=useMemo(()=>{const s=new Set();recs.forEach(r=>{if(r.mes_ref)s.add(r.mes_ref)});return [...s].sort();},[recs]);

  const monthly=useMemo(()=>{
    const rows=recs.filter(r=>r.mes_ref===mes);
    const bC={},bD={};let fat=0,fret=0;
    rows.forEach(r=>{fat+=r.valor_usd||0;fret+=r.frete_usd||0;const c=r.cliente||"—";bC[c]=(bC[c]||0)+(r.valor_usd||0);const d=r.destino||"—";bD[d]=(bD[d]||0)+1;});
    return {rows,fat,fret,cnt:rows.length,bC,bD};
  },[recs,mes]);

  /* YoY para o mês selecionado: mesmo mês do ano anterior */
  const monthlyPrev=useMemo(()=>{
    const parts=mes.split(" ");if(parts.length<2)return{fat:0,fret:0,cnt:0};
    const prevMes=parts[0]+" "+String(parseInt(parts[1])-1);
    const rows=recs.filter(r=>r.mes_ref===prevMes);
    return {fat:rows.reduce((s,r)=>s+(r.valor_usd||0),0),fret:rows.reduce((s,r)=>s+(r.frete_usd||0),0),cnt:rows.length,label:prevMes};
  },[recs,mes]);

  const YoYBadge = ({cur, prev, label, invert=false}) => {
    if(!prev || prev===0) return null;
    const pct = ((cur/prev)-1)*100;
    const up = pct >= 0;
    const good = invert ? !up : up;
    const color = good ? "#059669" : "#DC2626";
    const arrow = up ? "▲" : "▼";
    return <div style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:11,fontWeight:600,color,marginTop:4}}>
      <span>{arrow}</span><span>{Math.abs(pct).toFixed(1)}%</span>
      {label&&<span style={{fontWeight:400,color:"var(--text3)",fontSize:10}}>vs {label}</span>}
    </div>;
  };

  const annual=useMemo(()=>{
    const rows=recs.filter(r=>r.mes_ref?.includes(yr));
    const bM={};MESES.forEach(m=>{bM[m]={fat:0,cnt:0,fret:0}});
    rows.forEach(r=>{const m=r.mes_ref?.split(" ")[0];if(m&&bM[m]){bM[m].fat+=r.valor_usd||0;bM[m].fret+=r.frete_usd||0;bM[m].cnt++;}});
    const list=Object.entries(bM).filter(([,v])=>v.cnt>0).map(([m,v])=>({m,...v}));
    const tot={fat:list.reduce((s,r)=>s+r.fat,0),cnt:list.reduce((s,r)=>s+r.cnt,0),fret:list.reduce((s,r)=>s+r.fret,0)};
    return {list,tot};
  },[recs,yr]);

  /* Dados do ano anterior para comparação mês a mês */
  const prevYrRel = String(parseInt(yr)-1);
  const annualPrev=useMemo(()=>{
    const rows=recs.filter(r=>r.mes_ref?.includes(prevYrRel));
    const bM={};MESES.forEach(m=>{bM[m]={fat:0,cnt:0,fret:0}});
    rows.forEach(r=>{const m=r.mes_ref?.split(" ")[0];if(m&&bM[m]){bM[m].fat+=r.valor_usd||0;bM[m].fret+=r.frete_usd||0;bM[m].cnt++;}});
    const tot={fat:rows.reduce((s,r)=>s+(r.valor_usd||0),0),cnt:rows.length,fret:rows.reduce((s,r)=>s+(r.frete_usd||0),0)};
    return {byMes:bM,tot};
  },[recs,prevYrRel]);

  const allYearKeys = useMemo(()=>{
    const s=new Set();
    recs.forEach(r=>{const y=r.mes_ref?.split(" ")[1];if(y)s.add(y);});
    return [...s].sort();
  },[recs]);

  function csv(data,name){if(!data.length)return;const k=Object.keys(data[0]);const c=[k.join(","),...data.map(r=>k.map(x=>JSON.stringify(r[x]??"")||"").join(","))].join("\n");const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(c);a.download=name;a.click();}

  function relXLS(rows, mes) {
    const RCOLS = 11;
    const aoa = [
      ["RELATÓRIO MENSAL — "+mes,"","","","","","","","","",""],
      ["","","","","","","","","","",""],
      ["INVOICE","CLIENTE","PO#","NF","DESTINO","VALOR USD","FRETE USD","CONTAINER","ETA","STATUS DOC","STATUS"],
    ];
    rows.forEach((r,i)=>{
      aoa.push([r.invoice||"",r.cliente||"",xlInt(r.po),xlInt(r.nf),r.destino||"",
        xlUSD(r.valor_usd),xlUSD(r.frete_usd),r.container||"",xlDate(r.eta_pedido),r.status_doc||"",r.status||""]);
    });
    const totalUSD = rows.reduce((s,r)=>s+(r.valor_usd||0),0);
    const totRow = aoa.length;
    aoa.push(["","","","","TOTAL USD","$"+totalUSD.toFixed(2),"","","","",""]);
    const cntRow = aoa.length;
    aoa.push(["","","","","Nº CONTAINERS",rows.length,"","","","",""]);
    const ws = XLSX.utils.aoa_to_sheet(aoa);

    /* Styles */
    for(let c=0;c<RCOLS;c++) applyStyle(ws, XLSX.utils.encode_cell({r:0,c}), XS.title);
    for(let c=0;c<RCOLS;c++) applyStyle(ws, XLSX.utils.encode_cell({r:2,c}), XS.header);
    for(let r=3;r<3+rows.length;r++){
      for(let c=0;c<RCOLS;c++) applyStyle(ws, XLSX.utils.encode_cell({r,c}), r%2===1?XS.row0:XS.row1);
    }
    for(let c=0;c<RCOLS;c++){
      applyStyle(ws, XLSX.utils.encode_cell({r:totRow,c}), XS.total);
      applyStyle(ws, XLSX.utils.encode_cell({r:cntRow,c}), XS.totalLbl);
    }
    ws["!merges"]=[{s:{r:0,c:0},e:{r:0,c:RCOLS-1}}];

    ws["!cols"]=[{wch:10},{wch:14},{wch:12},{wch:10},{wch:14},{wch:13},{wch:13},{wch:15},{wch:12},{wch:14},{wch:16}];
    ws["!rows"]=[{hpx:28}];
    ws["!pageSetup"]={orientation:"landscape",paperSize:9,fitToWidth:1,fitToHeight:0,fitToPage:true};
    ws["!printOptions"]={gridLines:false};
    ws["!margins"]={left:0.4,right:0.4,top:0.6,bottom:0.5};
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,mes.slice(0,8));
    XLSX.writeFile(wb,`Mensal_${mes.replace(" ","_")}.xlsx`);
  }

  function annualXLS(list, yr) {
    const ACOLS = 6;
    const aoa=[["RELATÓRIO ANUAL — "+yr,"","","","",""],["","","","","",""],
      ["MÊS","CONTAINERS","FATURAMENTO USD","FRETE USD","MÉDIA/CNTR","% FRETE/FAT"]];
    list.forEach(r=>{
      aoa.push([r.m,r.cnt,r.fat,r.fret,r.cnt?r.fat/r.cnt:0,r.fat?(r.fret/r.fat):0]);
    });
    const tot=list.reduce((a,r)=>({fat:a.fat+r.fat,cnt:a.cnt+r.cnt,fret:a.fret+r.fret}),{fat:0,cnt:0,fret:0});
    const totRow = aoa.length;
    aoa.push(["TOTAL",tot.cnt,tot.fat,tot.fret,tot.cnt?tot.fat/tot.cnt:0,tot.fat?tot.fret/tot.fat:0]);
    const ws=XLSX.utils.aoa_to_sheet(aoa);

    /* Styles */
    for(let c=0;c<ACOLS;c++) applyStyle(ws, XLSX.utils.encode_cell({r:0,c}), XS.title);
    for(let c=0;c<ACOLS;c++) applyStyle(ws, XLSX.utils.encode_cell({r:2,c}), XS.header);
    for(let r=3;r<3+list.length;r++){
      for(let c=0;c<ACOLS;c++) applyStyle(ws, XLSX.utils.encode_cell({r,c}), r%2===1?XS.row0:XS.row1);
    }
    for(let c=0;c<ACOLS;c++) applyStyle(ws, XLSX.utils.encode_cell({r:totRow,c}), XS.total);
    ws["!merges"]=[{s:{r:0,c:0},e:{r:0,c:ACOLS-1}}];

    ws["!cols"]=[{wch:14},{wch:12},{wch:16},{wch:14},{wch:14},{wch:14}];
    ws["!rows"]=[{hpx:28}];
    ws["!pageSetup"]={orientation:"portrait",paperSize:9,fitToWidth:1,fitToHeight:0,fitToPage:true};
    ws["!printOptions"]={gridLines:false};
    ws["!margins"]={left:0.6,right:0.6,top:0.6,bottom:0.5};
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,yr);
    XLSX.writeFile(wb,`Anual_${yr}.xlsx`);
  }

  const REL_COLS = null; /* unused — kept for reference */

  return <div className="page">
    <div className="ph"><h2>Relatórios</h2><p>Relatórios mensais e anuais com exportação CSV e Excel</p></div>
    <div className="tabs">
      {[["mensal","Mensal"],["anual","Anual"],["geral","Geral"]].map(([id,lb])=>(
        <div key={id} className={`tab${tab===id?" on":""}`} onClick={()=>setTab(id)}>{lb}</div>
      ))}
    </div>

    {tab==="mensal"&&<>
      <div style={{display:"flex",gap:10,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
        <select className="sel" value={mes} onChange={e=>setMes(e.target.value)}>{avail.map(m=><option key={m}>{m}</option>)}</select>
        <button className="btn bgx bsm" onClick={()=>relXLS(monthly.rows,mes)}>↓ Excel</button>
        <button className="btn bg2 bsm" onClick={()=>csv(monthly.rows,"relatorio_"+mes.replace(" ","_")+".csv")}>↓ CSV</button>
      </div>
      <div className="kg">
        <div className="kp hi"><div className="kl">Faturamento</div><div className="kv tc" style={{fontSize:20}}>{fmtUSD(monthly.fat)}</div><YoYBadge cur={monthly.fat} prev={monthlyPrev.fat} label={monthlyPrev.label}/></div>
        <div className="kp"><div className="kl">Containers</div><div className="kv">{monthly.cnt}</div><YoYBadge cur={monthly.cnt} prev={monthlyPrev.cnt} label={monthlyPrev.label}/></div>
        <div className="kp"><div className="kl">Frete Total</div><div className="kv" style={{fontSize:20}}>{fmtUSD(monthly.fret)}</div><YoYBadge cur={monthly.fret} prev={monthlyPrev.fret} label={monthlyPrev.label} invert={true}/></div>
        <div className="kp"><div className="kl">Média/CNTR</div><div className="kv gc" style={{fontSize:20}}>{fmtUSD(monthly.cnt?monthly.fat/monthly.cnt:0)}</div></div>
      </div>
      <div className="g2 mb20">
        <div className="card"><div className="ct">Por Cliente</div><Bar data={Object.entries(monthly.bC).sort(([,a],[,b])=>b-a).map(([l,v])=>({l,v}))} fmt={v=>"$"+Math.round(v/1000)+"k"}/></div>
        <div className="card"><div className="ct">Por Destino</div><Donut data={Object.entries(monthly.bD).map(([l,v])=>({l,v}))}/></div>
      </div>
      <div className="card">
        <div className="ct">Detalhamento — {mes}</div>
        <div className="tw"><table>
          <thead><tr><th>Invoice</th><th>Cliente</th><th>PO#</th><th>NF</th><th>Destino</th><th>Valor USD</th><th>Frete USD</th><th>Container</th><th>ETA</th><th>Status Doc</th></tr></thead>
          <tbody>{monthly.rows.map(r=><tr key={r.invoice}>
            <td><strong style={{color:"var(--blue)"}}>{r.invoice}</strong></td><td>{r.cliente}</td><td className="m">{r.po||"—"}</td><td>{r.nf||"—"}</td>
            <td>{r.destino||"—"}</td><td className="r">{fmtUSD(r.valor_usd)}</td><td className="r">{fmtUSD(r.frete_usd)}</td>
            <td className="m">{r.container||"—"}</td><td>{fmtDate(r.eta_pedido)}</td><td><DocBadge v={r.status_doc}/></td>
          </tr>)}</tbody>
        </table></div>
      </div>
    </>}

    {tab==="anual"&&<>
      <div style={{display:"flex",gap:10,marginBottom:16,alignItems:"center"}}>
        <select className="sel" value={yr} onChange={e=>setYr(e.target.value)}>{allYearKeys.map(a=><option key={a}>{a}</option>)}</select>
        <button className="btn bgx bsm" onClick={()=>annualXLS(annual.list,yr)}>↓ Excel</button>
        <button className="btn bg2 bsm" onClick={()=>csv(annual.list.map(r=>({Mês:r.m,Containers:r.cnt,Faturamento:r.fat.toFixed(2),Frete:r.fret.toFixed(2)})),"anual_"+yr+".csv")}>↓ CSV</button>
      </div>
      <div className="kg">
        <div className="kp hi"><div className="kl">Faturamento {yr}</div><div className="kv tc" style={{fontSize:20}}>{fmtUSD(annual.tot.fat)}</div><YoYBadge cur={annual.tot.fat} prev={annualPrev.tot.fat} label={prevYrRel}/></div>
        <div className="kp"><div className="kl">Containers</div><div className="kv">{annual.tot.cnt}</div><YoYBadge cur={annual.tot.cnt} prev={annualPrev.tot.cnt} label={prevYrRel}/></div>
        <div className="kp"><div className="kl">Frete Total</div><div className="kv" style={{fontSize:20}}>{fmtUSD(annual.tot.fret)}</div><YoYBadge cur={annual.tot.fret} prev={annualPrev.tot.fret} label={prevYrRel} invert={true}/></div>
        <div className="kp"><div className="kl">Média/CNTR</div><div className="kv gc" style={{fontSize:20}}>{fmtUSD(annual.tot.cnt?annual.tot.fat/annual.tot.cnt:0)}</div></div>
      </div>
      <div className="card mb20"><div className="ct">Evolução Mensal</div><Bar data={annual.list.map(r=>({l:r.m.slice(0,3),v:r.fat}))} fmt={v=>"$"+Math.round(v/1000)+"k"}/></div>
      <div className="card">
        <div className="ct">Resumo por Mês — {yr} vs {prevYrRel}</div>
        <div className="tw"><table>
          <thead><tr>
            <th>Mês</th>
            <th>CNTR {yr.slice(2)}</th><th>Fat. {yr.slice(2)}</th><th>Frete {yr.slice(2)}</th>
            <th style={{borderLeft:"2px solid var(--border)",paddingLeft:10}}>CNTR {prevYrRel.slice(2)}</th><th>Fat. {prevYrRel.slice(2)}</th>
            <th>Δ Fat.</th>
          </tr></thead>
          <tbody>
            {annual.list.map(r=>{
              const p=annualPrev.byMes[r.m]||{fat:0,cnt:0,fret:0};
              const yoy=p.fat>0?((r.fat/p.fat)-1)*100:null;
              const yoyColor=yoy===null?"var(--text3)":yoy>=0?"#059669":"#DC2626";
              const yoyStr=yoy===null?"—":(yoy>=0?"+":"")+yoy.toFixed(1)+"%";
              return <tr key={r.m}>
                <td><strong>{r.m}</strong></td>
                <td className="r">{r.cnt}</td><td className="r">{fmtUSD(r.fat)}</td><td className="r">{fmtUSD(r.fret)}</td>
                <td className="r" style={{borderLeft:"2px solid var(--border)",paddingLeft:10,color:"var(--text2)"}}>{p.cnt||"—"}</td>
                <td className="r" style={{color:"var(--text2)"}}>{p.fat?fmtUSD(p.fat):"—"}</td>
                <td className="r" style={{color:yoyColor,fontWeight:600,fontSize:12}}>{yoyStr}</td>
              </tr>;
            })}
            {(()=>{
              const yoyTot=annualPrev.tot.fat>0?((annual.tot.fat/annualPrev.tot.fat)-1)*100:null;
              const yoyTotColor=yoyTot===null?"var(--text3)":yoyTot>=0?"#059669":"#DC2626";
              const yoyTotStr=yoyTot===null?"—":(yoyTot>=0?"+":"")+yoyTot.toFixed(1)+"%";
              return <tr style={{background:"#EBF4FE",fontWeight:700}}>
                <td><strong>TOTAL</strong></td>
                <td className="r">{annual.tot.cnt}</td><td className="r">{fmtUSD(annual.tot.fat)}</td><td className="r">{fmtUSD(annual.tot.fret)}</td>
                <td className="r" style={{borderLeft:"2px solid var(--border)",paddingLeft:10}}>{annualPrev.tot.cnt||"—"}</td>
                <td className="r">{annualPrev.tot.fat?fmtUSD(annualPrev.tot.fat):"—"}</td>
                <td className="r" style={{color:yoyTotColor,fontWeight:700,fontSize:12}}>{yoyTotStr}</td>
              </tr>;
            })()}
          </tbody>
        </table></div>
      </div>
    </>}

    {tab==="geral"&&<>
      <div style={{marginBottom:16,display:"flex",gap:10}}>
        <button className="btn bgx bsm" onClick={()=>csv(recs,"exportacoes_completo.csv")}>↓ CSV Completo</button>
      </div>
      <div className="g2 mb20">
        <div className="card"><div className="ct">Faturamento por Ano</div>
          <Bar data={Object.entries(recs.reduce((a,r)=>{const y=r.mes_ref?.split(" ")[1];if(y)a[y]=(a[y]||0)+(r.valor_usd||0);return a},{})).sort().map(([l,v])=>({l,v}))} color="#D97706" fmt={v=>"$"+Math.round(v/1000)+"k"}/>
        </div>
        <div className="card"><div className="ct">Containers por Ano</div>
          <Bar data={Object.entries(recs.reduce((a,r)=>{const y=r.mes_ref?.split(" ")[1];if(y)a[y]=(a[y]||0)+1;return a},{})).sort().map(([l,v])=>({l,v}))} color="#059669"/>
        </div>
      </div>
      <div className="card"><div className="ct">Participação por Cliente (todos os anos)</div>
        <Bar data={Object.entries(recs.reduce((a,r)=>{const c=r.cliente||"—";a[c]=(a[c]||0)+(r.valor_usd||0);return a},{})).sort(([,a],[,b])=>b-a).map(([l,v])=>({l,v}))} color="#7C3AED" fmt={v=>"$"+Math.round(v/1000)+"k"}/>
      </div>
    </>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
