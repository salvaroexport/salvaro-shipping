/* ── Badges ── */
const DocBadge = ({v}) => {
  if(!v) return <span className="badge bgg">—</span>;
  if(v==="COMPLETO") return <span className="badge bge">✓ Completo</span>;
  if(v==="FALTA BL") return <span className="badge bgy">⏳ Falta BL</span>;
  return <span className="badge bgr">⚠ Pendente</span>;
};
const EmbBadge = ({v}) => {
  if(!v) return <span className="badge bgg">—</span>;
  const m={EMBARCADO:"bgb","EM TRÂNSITO":"bgo","EM PRODUÇÃO":"bgg","AGD ESTUFAGEM":"bgy",ENTREGUE:"bge"};
  return <span className={`badge ${m[v]||"bgg"}`}>{v}</span>;
};

/* ── Toast ── */
const Toast = ({msg,type,onClose}) => {
  useEffect(()=>{const t=setTimeout(onClose,3500);return()=>clearTimeout(t);},[]);
  return <div className={`toast ${type==="ok"?"tok":"ter"}`}>{msg}</div>;
};

/* ── BarChart ── */
const Bar = ({data,color="#0EA5E9",fmt}) => {
  const max=Math.max(...data.map(d=>d.v),1);
  return <div>{data.map((d,i)=>(
    <div key={i} className="br2">
      <div className="bl2" title={d.l}>{d.l}</div>
      <div className="bt"><div className="bf" style={{width:`${(d.v/max)*100}%`,background:color}}/></div>
      <div className="bv">{fmt?fmt(d.v):d.v}</div>
    </div>
  ))}</div>;
};

/* ── Donut ── */
const Donut = ({data}) => {
  const total=data.reduce((s,d)=>s+d.v,0);
  if(!total) return null;
  const r=38,cx=55,cy=55,circ=2*Math.PI*r;
  const COLS=["#0EA5E9","#F59E0B","#10B981","#F97316","#8B5CF6","#EF4444","#EC4899","#14B8A6"];
  let off=0;
  const segs=data.map((d,i)=>{const pct=d.v/total,dash=pct*circ,seg={...d,dash,off:off*circ,c:COLS[i%COLS.length]};off+=pct;return seg;});
  return <div style={{display:"flex",alignItems:"center",gap:16}}>
    <svg width="110" height="110" viewBox="0 0 110 110" style={{flexShrink:0}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,.05)" strokeWidth="14"/>
      {segs.map((s,i)=><circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.c} strokeWidth="14"
        strokeDasharray={`${s.dash} ${circ-s.dash}`} strokeDashoffset={circ/4-s.off}/>)}
      <text x={cx} y={cy+5} textAnchor="middle" fill="#E2EAF4" fontSize="14" fontWeight="700" fontFamily="Syne">{total}</text>
    </svg>
    <div style={{display:"flex",flexDirection:"column",gap:7}}>
      {segs.map((s,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:12}}>
        <div style={{width:9,height:9,borderRadius:"50%",background:s.c,flexShrink:0}}/>
        <span style={{color:"var(--text2)"}}>{s.l}</span>
        <span style={{marginLeft:"auto",fontWeight:600,paddingLeft:10}}>{s.v}</span>
      </div>)}
    </div>
  </div>;
};

/* ══════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════ */
function App() {
  const [pg,setPg]=useState("dash");
  const [recs,setRecs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState(null);
  const notify=useCallback((msg,type="ok")=>setToast({msg,type}),[]);

  useEffect(()=>{load();},[]);

  async function load() {
    setLoading(true);
    const {data,error}=await db.from("exportacoes").select("*").order("invoice");
    if(error) notify("Erro: "+error.message,"err");
    else setRecs(data||[]);
    setLoading(false);
  }

  async function save(rec) {
    const {error}=await db.from("exportacoes").upsert(rec,{onConflict:"invoice"});
    if(error){notify("Erro ao salvar: "+error.message,"err");return false;}
    await load(); notify("Salvo!"); return true;
  }

  async function remove(invoice) {
    const {error}=await db.from("exportacoes").delete().eq("invoice",invoice);
    if(error){notify("Erro ao excluir","err");return;}
    await load(); notify("Excluído.");
  }

  const NAV=[
    {id:"dash",ic:IC.dash,lb:"Dashboard"},
    {id:"ops", ic:IC.ops, lb:"Operacional"},
    {id:"cart",ic:IC.cart,lb:"Carteira"},
    {id:"base",ic:IC.db,  lb:"Base de Dados"},
    {id:"rel", ic:IC.rep, lb:"Relatórios"},
  ];

  return <>
    <style>{CSS}</style>
    <div className="app">
      <aside className="sidebar">
        <div className="logo">
          <h1>SALV<span>ARO</span></h1>
          <p>Export Control</p>
        </div>
        <div className="nav">
          <div className="nlbl">Navegação</div>
          {NAV.map(n=>(
            <div key={n.id} className={`ni${pg===n.id?" on":""}`} onClick={()=>setPg(n.id)}>
              {n.ic}<span>{n.lb}</span>
            </div>
          ))}
        </div>
        <div className="sft">
          <div>v2.0 · Supabase</div>
          <div style={{color:"var(--green)",marginTop:3}}>● {recs.length} registros</div>
        </div>
      </aside>
      <main className="main">
        {loading
          ? <div className="lw"><div className="spin2"/></div>
          : <>
              {pg==="dash" && <PgDash recs={recs}/>}
              {pg==="ops"  && <PgOps  recs={recs}/>}
              {pg==="cart" && <PgCart recs={recs}/>}
              {pg==="base" && <PgBase recs={recs} onSave={save} onDel={remove} notify={notify}/>}
              {pg==="rel"  && <PgRel  recs={recs}/>}
            </>
        }
      </main>
    </div>
    {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
  </>;
}

/* ══════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════ */
function PgDash({recs}) {
  const [yr,setYr]=useState("2026");
  const fil=useMemo(()=>yr==="TODOS"?recs:recs.filter(r=>r.mes_ref?.includes(yr)),[recs,yr]);
  const fat=fil.reduce((s,r)=>s+(r.valor_usd||0),0);
  const fret=fil.reduce((s,r)=>s+(r.frete_usd||0),0);
  const cnt=fil.length;

  const byMonth=useMemo(()=>{
    const m={};
    fil.forEach(r=>{const k=r.mes_ref||"?";if(!m[k])m[k]={v:0,mes:k.split(" ")[0],ano:k.split(" ")[1]||""};m[k].v+=r.valor_usd||0;});
    return Object.entries(m).sort(([,a],[,b])=>MESES.indexOf(a.mes)-MESES.indexOf(b.mes)).map(([,v])=>({l:v.mes.slice(0,3)+"/"+v.ano.slice(2),v:v.v}));
  },[fil]);

  const byCli=useMemo(()=>{
    const m={};fil.forEach(r=>{const c=r.cliente||"—";m[c]=(m[c]||0)+(r.valor_usd||0);});
    return Object.entries(m).sort(([,a],[,b])=>b-a).map(([l,v])=>({l,v}));
  },[fil]);

  const byDst=useMemo(()=>{
    const m={};fil.forEach(r=>{const d=r.destino||"—";m[d]=(m[d]||0)+1;});
    return Object.entries(m).sort(([,a],[,b])=>b-a).map(([l,v])=>({l,v}));
  },[fil]);

  const docSt=useMemo(()=>{
    const m={COMPLETO:0,"FALTA BL":0,PENDENTE:0};
    fil.forEach(r=>{const k=r.status_doc||"PENDENTE";m[k]=(m[k]||0)+1;});
    return Object.entries(m).filter(([,v])=>v>0).map(([l,v])=>({l,v}));
  },[fil]);

  const annual=useMemo(()=>{
    const m={};
    recs.forEach(r=>{const y=r.mes_ref?.split(" ")[1];if(!y)return;if(!m[y])m[y]={fat:0,cnt:0,fret:0};m[y].fat+=r.valor_usd||0;m[y].cnt++;m[y].fret+=r.frete_usd||0;});
    return Object.entries(m).sort().map(([ano,v])=>({ano,...v}));
  },[recs]);

  return <div className="page">
    <div className="ph">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div><h2>Dashboard Geral</h2><p>Visão consolidada de exportações Salvaro</p></div>
        <select className="sel" value={yr} onChange={e=>setYr(e.target.value)}>
          <option value="TODOS">Todos os anos</option>
          {ANOS.map(a=><option key={a}>{a}</option>)}
        </select>
      </div>
    </div>
    <div className="kg">
      <div className="kp hi"><div className="kl">Faturamento USD</div><div className="kv tc" style={{fontSize:20}}>{fmtUSD(fat)}</div><div className="ks">{yr}</div></div>
      <div className="kp"><div className="kl">Containers</div><div className="kv">{cnt}</div><div className="ks">embarques</div></div>
      <div className="kp"><div className="kl">Média / CNTR</div><div className="kv gc" style={{fontSize:20}}>{fmtUSD(cnt?fat/cnt:0)}</div></div>
      <div className="kp"><div className="kl">Frete Total</div><div className="kv" style={{fontSize:20}}>{fmtUSD(fret)}</div><div className="ks">{fat?((fret/fat)*100).toFixed(1)+"%":"—"} do fat.</div></div>
      <div className="kp"><div className="kl">Clientes</div><div className="kv gr">{byCli.length}</div><div className="ks">no período</div></div>
    </div>
    <div className="g2 mb20">
      <div className="card"><div className="ct">Faturamento por Mês</div><Bar data={byMonth} fmt={v=>"$"+Math.round(v/1000)+"k"}/></div>
      <div className="card"><div className="ct">Faturamento por Cliente</div><Bar data={byCli} color="#F59E0B" fmt={v=>"$"+Math.round(v/1000)+"k"}/></div>
    </div>
    <div className="g2 mb20">
      <div className="card"><div className="ct">Destinos (containers)</div><Donut data={byDst}/></div>
      <div className="card"><div className="ct">Status Documentação</div><Donut data={docSt}/></div>
    </div>
    <div className="card">
      <div className="ct">Histórico Anual</div>
      <div className="tw"><table>
        <thead><tr><th>Ano</th><th>Faturamento</th><th>Containers</th><th>Média/CNTR</th><th>Frete Total</th><th>% Frete/Fat</th></tr></thead>
        <tbody>{annual.map(r=><tr key={r.ano}>
          <td><strong>{r.ano}</strong></td>
          <td className="r">{fmtUSD(r.fat)}</td><td className="r">{r.cnt}</td>
          <td className="r">{fmtUSD(r.cnt?r.fat/r.cnt:0)}</td><td className="r">{fmtUSD(r.fret)}</td>
          <td className="r">{r.fat?((r.fret/r.fat)*100).toFixed(1)+"%":"—"}</td>
        </tr>)}</tbody>
      </table></div>
    </div>
  </div>;
}

/* ══════════════════════════════════════════

function PgOps({recs}) {
  const now=new Date(),ci=now.getMonth(),cy=String(now.getFullYear());
  const pi=ci===0?11:ci-1, py=ci===0?String(now.getFullYear()-1):cy;
  const ni=(ci+1)%12, ny=ci===11?String(now.getFullYear()+1):cy;
  const avail=useMemo(()=>{const s=new Set();recs.forEach(r=>{if(r.mes_ref)s.add(r.mes_ref)});return [...s].sort();},[recs]);
  const [ant,setAnt]=useState(MESES[pi]+" "+py);
  const [vig,setVig]=useState(MESES[ci]+" "+cy);
  const [seg,setSeg]=useState(MESES[ni]+" "+ny);

  const Sec=({title,mes,col})=>{
    const rows=recs.filter(r=>r.mes_ref===mes).sort((a,b)=>(a.invoice||0)-(b.invoice||0));
    const tot=rows.reduce((s,r)=>s+(r.valor_usd||0),0);
    return <div className="card mb20">
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <div style={{width:9,height:9,borderRadius:"50%",background:col}}/>
        <div className="ct" style={{marginBottom:0}}>{title}</div>
        <strong style={{fontSize:14}}>{mes}</strong>
        <span style={{color:"var(--text2)",fontSize:12}}>— {rows.length} embarques — {fmtUSD(tot)}</span>
      </div>
      <div className="tw"><table>
        <thead><tr><th>Nº</th><th>Invoice</th><th>Cliente</th><th>PO#</th><th>NF</th><th>Destino</th><th>ETA</th><th>Agente</th><th>Booking</th><th>Container</th><th>Navio</th><th>DL Carga</th><th>Estufagem</th><th>Transp.</th></tr></thead>
        <tbody>{rows.length===0
          ?<tr><td colSpan={14} className="empty">Nenhum embarque neste período</td></tr>
          :rows.map((r,i)=><tr key={r.invoice}>
            <td className="m">{r.nr||i+1}</td><td><strong>{r.invoice}</strong></td>
            <td>{r.cliente||"—"}</td><td className="m">{r.po||"—"}</td><td>{r.nf||"—"}</td>
            <td>{r.destino||"—"}</td><td>{fmtDate(r.eta_pedido)}</td>
            <td>{r.agente?.split(" -")[0]||"—"}</td><td className="m">{r.booking||"—"}</td>
            <td>{r.container||"—"}</td><td className="m">{r.navio||"—"}</td>
            <td>{fmtDate(r.dl_carga)}</td><td>{fmtDate(r.estufagem)}</td>
            <td className="m">{r.transportadora||"—"}</td>
          </tr>)
        }</tbody>
      </table></div>
    </div>;
  };

  return <div className="page">
    <div className="ph"><h2>Controle Operacional</h2><p>Mês anterior, vigente e seguinte</p></div>
    <div className="card mb20">
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
        {[["Mês Anterior",ant,setAnt,"#F59E0B"],["Mês Vigente",vig,setVig,"#0EA5E9"],["Mês Seguinte",seg,setSeg,"#10B981"]].map(([lb,val,set,col])=>(
          <div key={lb}>
            <div style={{fontSize:11,fontWeight:600,color:"var(--text2)",letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>{lb}</div>
            <select className="sel" style={{width:"100%",borderColor:col+"44"}} value={val} onChange={e=>set(e.target.value)}>
              {avail.map(m=><option key={m}>{m}</option>)}
            </select>
          </div>
        ))}
      </div>
    </div>
    <Sec title="MÊS ANTERIOR" mes={ant} col="#F59E0B"/>
    <Sec title="MÊS VIGENTE"  mes={vig} col="#0EA5E9"/>
    <Sec title="MÊS SEGUINTE" mes={seg} col="#10B981"/>
  </div>;
}

            </div>

  return <div className="page">

/* ══════════════════════════════════════════
   BASE DE DADOS
══════════════════════════════════════════ */
function PgBase({recs,onSave,onDel,notify}) {
  const [q,setQ]=useState(""); const [fC,setFC]=useState(""); const [fM,setFM]=useState(""); const [fD,setFD]=useState("");
  const [modal,setModal]=useState(null); const [del,setDel]=useState(null); const [saving,setSaving]=useState(false);
  const avail=useMemo(()=>{const s=new Set();recs.forEach(r=>{if(r.mes_ref)s.add(r.mes_ref)});return [...s].sort();},[recs]);
  const fil=useMemo(()=>recs.filter(r=>{
    if(q&&!String(r.invoice).includes(q)&&!(r.cliente||"").toLowerCase().includes(q.toLowerCase())&&!(r.navio||"").toLowerCase().includes(q.toLowerCase())) return false;
    if(fC&&r.cliente!==fC) return false;
    if(fM&&r.mes_ref!==fM) return false;
    if(fD&&r.status_doc!==fD) return false;
    return true;
  }),[recs,q,fC,fM,fD]);

  const E0={invoice:"",cliente:"",po:"",nf:"",porto_carga:"IMBITUBA",destino:"",navio:"",container:"",booking:"",transportadora:"",valor_usd:"",frete_usd:"",agente:"",isf_docs:"",bl:"",status_doc:"PENDENTE",dl_carga:"",estufagem:"",eta_pedido:"",status:"",mes_ref:""};
  const [form,setForm]=useState(E0);
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));

  function openEdit(r){setForm({invoice:r.invoice||"",cliente:r.cliente||"",po:r.po||"",nf:r.nf||"",porto_carga:r.porto_carga||"IMBITUBA",destino:r.destino||"",navio:r.navio||"",container:r.container||"",booking:r.booking||"",transportadora:r.transportadora||"",valor_usd:r.valor_usd||"",frete_usd:r.frete_usd||"",agente:r.agente||"",isf_docs:r.isf_docs||"",bl:r.bl||"",status_doc:r.status_doc||"PENDENTE",dl_carga:r.dl_carga||"",estufagem:r.estufagem||"",eta_pedido:r.eta_pedido||"",status:r.status||"",mes_ref:r.mes_ref||""});setModal(r);}

  async function hSave(){
    if(!form.invoice){notify("Invoice obrigatório","err");return;}
    if(!form.mes_ref){notify("Mês de referência obrigatório","err");return;}
    setSaving(true);
    const ok=await onSave({...form,invoice:parseInt(form.invoice),valor_usd:parseFloat(form.valor_usd)||null,frete_usd:parseFloat(form.frete_usd)||null,isf_docs:form.isf_docs||null,bl:form.bl||null,dl_carga:form.dl_carga||null,estufagem:form.estufagem||null,eta_pedido:form.eta_pedido||null});
    setSaving(false); if(ok)setModal(null);
  }

  const F=({label,field,type="text",opts=null})=>(
    <div className="field">
      <label>{label}</label>
      {opts?<select value={form[field]||""} onChange={e=>upd(field,e.target.value)}><option value="">— selecione —</option>{opts.map(o=><option key={o}>{o}</option>)}</select>
           :<input type={type} value={form[field]||""} onChange={e=>upd(field,e.target.value)}/>}
    </div>
  );

  return <div className="page">
    <div className="ph">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
        <div><h2>Base de Dados</h2><p>{recs.length} registros · {fil.length} exibidos</p></div>
        <button className="btn bp" onClick={()=>{setForm(E0);setModal("new")}}>+ Novo Embarque</button>
      </div>
    </div>
    <div className="fb">
      <input placeholder="Buscar invoice, cliente, navio..." value={q} onChange={e=>setQ(e.target.value)} style={{width:260}}/>
      <select value={fC} onChange={e=>setFC(e.target.value)}><option value="">Todos os clientes</option>{CLIENTES.map(c=><option key={c}>{c}</option>)}</select>
      <select value={fM} onChange={e=>setFM(e.target.value)}><option value="">Todos os meses</option>{avail.map(m=><option key={m}>{m}</option>)}</select>
      <select value={fD} onChange={e=>setFD(e.target.value)}><option value="">Todos status doc</option>{STATUS_DOC.map(s=><option key={s}>{s}</option>)}</select>
      <button className="btn bg2 bsm" onClick={()=>{setQ("");setFC("");setFM("");setFD("")}}>Limpar</button>
    </div>
    <div className="card">
      <div className="tw"><table>
        <thead><tr><th>Invoice</th><th>Mês Ref</th><th>Cliente</th><th>Destino</th><th>Valor USD</th><th>Frete USD</th><th>Agente</th><th>Container</th><th>ETA</th><th>Status Doc</th><th>Status</th><th></th></tr></thead>
        <tbody>
          {fil.length===0?<tr><td colSpan={12} className="empty">Nenhum registro</td></tr>
          :fil.map(r=><tr key={r.invoice} onClick={()=>openEdit(r)}>
            <td><strong>{r.invoice}</strong></td><td className="m">{r.mes_ref}</td>
            <td>{r.cliente}</td><td>{r.destino||"—"}</td>
            <td className="r">{fmtUSD(r.valor_usd)}</td><td className="r">{fmtUSD(r.frete_usd)}</td>
            <td className="m">{r.agente?.split(" -")[0]||"—"}</td><td className="m">{r.container||"—"}</td>
            <td>{fmtDate(r.eta_pedido)}</td><td><DocBadge v={r.status_doc}/></td><td><EmbBadge v={r.status}/></td>
            <td onClick={e=>{e.stopPropagation();setDel(r)}}><button className="btn bd bsm">✕</button></td>
          </tr>)}
        </tbody>
      </table></div>
    </div>

    {modal&&<div className="overlay" onClick={()=>setModal(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="mh"><h3>{modal==="new"?"Novo Embarque":"Editar — INV "+modal.invoice}</h3><button className="btn bg2 bsm" onClick={()=>setModal(null)}>✕</button></div>
        <div className="mb2">
          <div className="st">Identificação</div>
          <div className="fr mb16"><F label="Invoice *" field="invoice" type="number"/><F label="Mês Ref *" field="mes_ref" opts={ALL_MONTHS}/><F label="Cliente" field="cliente" opts={CLIENTES}/><F label="PO#" field="po"/><F label="NF" field="nf"/></div>
          <hr className="dv"/>
          <div className="st">Logística</div>
          <div className="fr mb16"><F label="Porto de Carga" field="porto_carga" opts={PORTOS}/><F label="Destino" field="destino" opts={DESTINOS}/><F label="Navio" field="navio"/><F label="Container" field="container"/><F label="Booking" field="booking"/><F label="Transportadora" field="transportadora" opts={TRANSP}/></div>
          <hr className="dv"/>
          <div className="st">Financeiro</div>
          <div className="fr mb16"><F label="Valor USD" field="valor_usd" type="number"/><F label="Frete USD" field="frete_usd" type="number"/><F label="Agente" field="agente"/></div>
          <hr className="dv"/>
          <div className="st">Documentação e Datas</div>
          <div className="fr"><F label="ISF/DOCS" field="isf_docs" type="date"/><F label="BL" field="bl" type="date"/><F label="Status Doc" field="status_doc" opts={STATUS_DOC}/><F label="DL Carga" field="dl_carga" type="date"/><F label="Estufagem" field="estufagem" type="date"/><F label="ETA Pedido" field="eta_pedido" type="date"/><F label="Status" field="status" opts={STATUS_EMB}/></div>
          <div className="mac"><button className="btn bg2" onClick={()=>setModal(null)}>Cancelar</button><button className="btn bp" onClick={hSave} disabled={saving}>{saving?"Salvando...":"Salvar"}</button></div>
        </div>
      </div>
    </div>}
    {del&&<div className="overlay" onClick={()=>setDel(null)}>
      <div className="modal" style={{maxWidth:380}} onClick={e=>e.stopPropagation()}>
        <div className="mh"><h3>Confirmar Exclusão</h3></div>
        <div className="mb2">
          <p>Excluir <strong>INV {del.invoice}</strong> ({del.cliente})?</p>
          <p style={{fontSize:12,color:"var(--text2)",marginTop:8}}>Esta ação não pode ser desfeita.</p>
          <div className="mac"><button className="btn bg2" onClick={()=>setDel(null)}>Cancelar</button><button className="btn bd" onClick={()=>{onDel(del.invoice);setDel(null)}}>Excluir</button></div>
        </div>
      </div>
    </div>}
  </div>;
}

/* ══════════════════════════════════════════
   RELATÓRIOS
══════════════════════════════════════════ */
function PgRel({recs}) {
  const [tab,setTab]=useState("mensal");
  const [yr,setYr]=useState("2026");
  const [mes,setMes]=useState("ABRIL 2026");
  const avail=useMemo(()=>{const s=new Set();recs.forEach(r=>{if(r.mes_ref)s.add(r.mes_ref)});return [...s].sort();},[recs]);

  const monthly=useMemo(()=>{
    const rows=recs.filter(r=>r.mes_ref===mes);
    const bC={},bD={};let fat=0,fret=0;
    rows.forEach(r=>{fat+=r.valor_usd||0;fret+=r.frete_usd||0;const c=r.cliente||"—";bC[c]=(bC[c]||0)+(r.valor_usd||0);const d=r.destino||"—";bD[d]=(bD[d]||0)+1;});
    return {rows,fat,fret,cnt:rows.length,bC,bD};
  },[recs,mes]);

  const annual=useMemo(()=>{
    const rows=recs.filter(r=>r.mes_ref?.includes(yr));
    const bM={};MESES.forEach(m=>{bM[m]={fat:0,cnt:0,fret:0}});
    rows.forEach(r=>{const m=r.mes_ref?.split(" ")[0];if(m&&bM[m]){bM[m].fat+=r.valor_usd||0;bM[m].fret+=r.frete_usd||0;bM[m].cnt++;}});
    const list=Object.entries(bM).filter(([,v])=>v.cnt>0).map(([m,v])=>({m,...v}));
    const tot={fat:list.reduce((s,r)=>s+r.fat,0),cnt:list.reduce((s,r)=>s+r.cnt,0),fret:list.reduce((s,r)=>s+r.fret,0)};
    return {list,tot};
  },[recs,yr]);

  function csv(data,name){if(!data.length)return;const k=Object.keys(data[0]);const c=[k.join(","),...data.map(r=>k.map(x=>JSON.stringify(r[x]??"")||"").join(","))].join("\n");const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(c);a.download=name;a.click();}

  return <div className="page">
    <div className="ph"><h2>Relatórios</h2><p>Relatórios mensais e anuais com exportação CSV</p></div>
    <div className="tabs">
      {[["mensal","Mensal"],["anual","Anual"],["geral","Geral"]].map(([id,lb])=>(
        <div key={id} className={`tab${tab===id?" on":""}`} onClick={()=>setTab(id)}>{lb}</div>
      ))}
    </div>

    {tab==="mensal"&&<>
      <div style={{display:"flex",gap:12,marginBottom:18,alignItems:"center",flexWrap:"wrap"}}>
        <select className="sel" value={mes} onChange={e=>setMes(e.target.value)}>{avail.map(m=><option key={m}>{m}</option>)}</select>
        <button className="btn bgd bsm" onClick={()=>csv(monthly.rows,"relatorio_"+mes.replace(" ","_")+".csv")}>↓ Exportar CSV</button>
      </div>
      <div className="kg">
        <div className="kp hi"><div className="kl">Faturamento</div><div className="kv tc" style={{fontSize:20}}>{fmtUSD(monthly.fat)}</div></div>
        <div className="kp"><div className="kl">Containers</div><div className="kv">{monthly.cnt}</div></div>
        <div className="kp"><div className="kl">Frete Total</div><div className="kv" style={{fontSize:20}}>{fmtUSD(monthly.fret)}</div></div>
        <div className="kp"><div className="kl">Média/CNTR</div><div className="kv gc" style={{fontSize:20}}>{fmtUSD(monthly.cnt?monthly.fat/monthly.cnt:0)}</div></div>
      </div>
      <div className="g2 mb20">
        <div className="card"><div className="ct">Por Cliente</div><Bar data={Object.entries(monthly.bC).sort(([,a],[,b])=>b-a).map(([l,v])=>({l,v}))} fmt={v=>"$"+Math.round(v/1000)+"k"}/></div>
        <div className="card"><div className="ct">Por Destino</div><Donut data={Object.entries(monthly.bD).map(([l,v])=>({l,v}))}/></div>
      </div>
      <div className="card">
        <div className="ct">Detalhamento — {mes}</div>
        <div className="tw"><table>
          <thead><tr><th>Invoice</th><th>Cliente</th><th>PO#</th><th>NF</th><th>Destino</th><th>Valor USD</th><th>Frete USD</th><th>Container</th><th>ETA</th><th>Status Doc</th></tr></thead>
          <tbody>{monthly.rows.map(r=><tr key={r.invoice}>
            <td><strong>{r.invoice}</strong></td><td>{r.cliente}</td><td className="m">{r.po||"—"}</td><td>{r.nf||"—"}</td>
            <td>{r.destino||"—"}</td><td className="r">{fmtUSD(r.valor_usd)}</td><td className="r">{fmtUSD(r.frete_usd)}</td>
            <td className="m">{r.container||"—"}</td><td>{fmtDate(r.eta_pedido)}</td><td><DocBadge v={r.status_doc}/></td>
          </tr>)}</tbody>
        </table></div>
      </div>
    </>}

    {tab==="anual"&&<>
      <div style={{display:"flex",gap:12,marginBottom:18,alignItems:"center"}}>
        <select className="sel" value={yr} onChange={e=>setYr(e.target.value)}>{ANOS.map(a=><option key={a}>{a}</option>)}</select>
        <button className="btn bgd bsm" onClick={()=>csv(annual.list.map(r=>({Mês:r.m,Containers:r.cnt,Faturamento:r.fat.toFixed(2),Frete:r.fret.toFixed(2)})),"anual_"+yr+".csv")}>↓ Exportar CSV</button>
      </div>
      <div className="kg">
        <div className="kp hi"><div className="kl">Faturamento {yr}</div><div className="kv tc" style={{fontSize:20}}>{fmtUSD(annual.tot.fat)}</div></div>
        <div className="kp"><div className="kl">Containers</div><div className="kv">{annual.tot.cnt}</div></div>
        <div className="kp"><div className="kl">Frete Total</div><div className="kv" style={{fontSize:20}}>{fmtUSD(annual.tot.fret)}</div></div>
        <div className="kp"><div className="kl">Média/CNTR</div><div className="kv gc" style={{fontSize:20}}>{fmtUSD(annual.tot.cnt?annual.tot.fat/annual.tot.cnt:0)}</div></div>
      </div>
      <div className="card mb20"><div className="ct">Evolução Mensal</div><Bar data={annual.list.map(r=>({l:r.m.slice(0,3),v:r.fat}))} fmt={v=>"$"+Math.round(v/1000)+"k"}/></div>
      <div className="card">
        <div className="ct">Resumo por Mês — {yr}</div>
        <div className="tw"><table>
          <thead><tr><th>Mês</th><th>Containers</th><th>Faturamento</th><th>Frete</th><th>Média/CNTR</th><th>% Frete/Fat</th></tr></thead>
          <tbody>
            {annual.list.map(r=><tr key={r.m}>
              <td><strong>{r.m}</strong></td><td className="r">{r.cnt}</td><td className="r">{fmtUSD(r.fat)}</td>
              <td className="r">{fmtUSD(r.fret)}</td><td className="r">{fmtUSD(r.cnt?r.fat/r.cnt:0)}</td>
              <td className="r">{r.fat?((r.fret/r.fat)*100).toFixed(1)+"%":"—"}</td>
            </tr>)}
            <tr style={{background:"rgba(14,165,233,.08)",fontWeight:700}}>
              <td><strong>TOTAL</strong></td><td className="r">{annual.tot.cnt}</td><td className="r">{fmtUSD(annual.tot.fat)}</td>
              <td className="r">{fmtUSD(annual.tot.fret)}</td><td className="r">{fmtUSD(annual.tot.cnt?annual.tot.fat/annual.tot.cnt:0)}</td>
              <td className="r">{annual.tot.fat?((annual.tot.fret/annual.tot.fat)*100).toFixed(1)+"%":"—"}</td>
            </tr>
          </tbody>
        </table></div>
      </div>
    </>}

    {tab==="geral"&&<>
      <div style={{marginBottom:18}}><button className="btn bgd bsm" onClick={()=>csv(recs,"exportacoes_completo.csv")}>↓ Exportar Todos os Dados</button></div>
      <div className="g2 mb20">
        <div className="card"><div className="ct">Faturamento por Ano</div>
          <Bar data={Object.entries(recs.reduce((a,r)=>{const y=r.mes_ref?.split(" ")[1];if(y)a[y]=(a[y]||0)+(r.valor_usd||0);return a},{})).sort().map(([l,v])=>({l,v}))} color="#F59E0B" fmt={v=>"$"+Math.round(v/1000)+"k"}/>
        </div>
        <div className="card"><div className="ct">Containers por Ano</div>
          <Bar data={Object.entries(recs.reduce((a,r)=>{const y=r.mes_ref?.split(" ")[1];if(y)a[y]=(a[y]||0)+1;return a},{})).sort().map(([l,v])=>({l,v}))} color="#10B981"/>
        </div>
      </div>
      <div className="card"><div className="ct">Participação por Cliente (todos os anos)</div>
        <Bar data={Object.entries(recs.reduce((a,r)=>{const c=r.cliente||"—";a[c]=(a[c]||0)+(r.valor_usd||0);return a},{})).sort(([,a],[,b])=>b-a).map(([l,v])=>({l,v}))} color="#8B5CF6" fmt={v=>"$"+Math.round(v/1000)+"k"}/>
      </div>
    </>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
